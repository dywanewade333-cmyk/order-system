<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .menu-card-active { border: 2px solid #3b82f6; background-color: #eff6ff; }

        html.dark body { background-color: #0f172a; color: #f1f5f9; }
        html.dark nav { background-color: #1e293b !important; }
        html.dark .bg-white { background-color: #1e293b !important; }
        html.dark .bg-gray-50 { background-color: #0f172a !important; }
        html.dark .bg-gray-100 { background-color: #334155 !important; }
        html.dark #cart-bar { background-color: rgba(30,41,59,0.9) !important; border-color: #334155 !important; }
        html.dark .text-gray-800 { color: #f1f5f9 !important; }
        html.dark .text-gray-700 { color: #e2e8f0 !important; }
        html.dark .text-gray-600 { color: #cbd5e1 !important; }
        html.dark .text-gray-500 { color: #94a3b8 !important; }
        html.dark .text-gray-400 { color: #475569 !important; }
        html.dark .border-gray-200 { border-color: #334155 !important; }
        html.dark .border-gray-100 { border-color: #1e293b !important; }
        html.dark .border-b { border-color: #334155 !important; }
        html.dark .border-dashed { border-color: #334155 !important; }
        html.dark .ring-1 { --tw-ring-color: #334155 !important; }
        html.dark input, html.dark textarea { background-color: #0f172a !important; color: #f1f5f9 !important; }
        html.dark input::placeholder, html.dark textarea::placeholder { color: #475569 !important; }
        html.dark .menu-card-active { background-color: #1e3a5f !important; }
        html.dark .hover\:bg-gray-50:hover { background-color: #253146 !important; }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center">
                <span class="mr-2">🗃️</span> 豬仔養成計畫
            </h1>
            <div class="flex items-center space-x-4">
                <button onclick="switchView('user')" id="btn-user" class="text-sm font-medium tab-active py-1">我要點餐</button>
                <button onclick="switchView('admin')" id="btn-admin" class="text-sm font-medium text-gray-500 py-1">菜單管理</button>
                <button onclick="switchView('summary')" id="btn-summary" class="text-sm font-medium text-gray-500 py-1">訂單統計</button>
                <button id="dark-toggle" onclick="toggleDark()" class="text-lg leading-none">🌙</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">

        <!-- View: User (點餐) -->
        <section id="view-user" class="block">
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-200">
                <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-widest">你的名字</label>
                <input type="text" id="user-name-input" oninput="saveUserName()" class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-400 outline-none transition-all text-lg font-bold" placeholder="輸入名字開始點餐...">
            </div>
            <div id="menu-container" class="space-y-4"></div>
        </section>

        <!-- View: Admin (菜單管理) -->
        <section id="view-admin" class="hidden">
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-lg font-bold flex items-center text-gray-700"><span class="mr-2">📁</span> 菜單資料庫</h2>
                <button onclick="openMenuModal()" class="flex items-center gap-2 bg-blue-600 text-white text-sm font-bold px-4 py-2 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                    <span class="text-base leading-none">➕</span> 新增菜單
                </button>
            </div>
            <div class="mb-4 space-y-3">
                <input type="text" id="lib-search" oninput="filterLibrary()" class="w-full p-3 rounded-xl bg-white border border-gray-200 text-sm outline-none focus:border-blue-300" placeholder="🔍 搜尋店名...">
                <div id="lib-category-tabs" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="database-list"></div>
        </section>

        <!-- View: Summary (統計) -->
        <section id="view-summary" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">訂單統計總覽</h2>
                    <button onclick="clearOrders()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">清空紀錄</button>
                </div>
                <div id="order-summary-content"></div>
            </div>
        </section>

    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-6 py-4 shadow-2xl z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-black uppercase">點餐人</p>
                <p class="text-lg font-black text-gray-700"><span id="cart-name-display">—</span></p>
            </div>
            <button id="submit-btn" onclick="submitOrder()" disabled class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95">
                請輸入名字
            </button>
        </div>
    </div>

    <!-- Menu Form Modal -->
    <div id="menu-form-modal" class="hidden fixed inset-0 bg-black/60 z-[90] flex items-center justify-center p-4" onclick="handleModalBackdrop(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-lg font-bold flex items-center"><span class="mr-2">➕</span> 新增菜單</h2>
                <button onclick="cancelEdit()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:bg-gray-50 transition-colors">
                    <input type="file" id="menu-image" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                    <label for="menu-image" class="cursor-pointer block py-6">
                        <div id="upload-placeholder">
                            <div class="text-4xl mb-2">📸</div>
                            <p class="text-sm font-bold text-blue-600">上傳菜單圖片</p>
                            <p class="text-xs text-gray-400 mt-1">點此選取或拍照</p>
                        </div>
                        <img id="image-preview" class="hidden max-h-48 mx-auto rounded shadow-sm">
                    </label>
                </div>
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">店名</label>
                        <input type="text" id="new-menu-title" class="w-full p-2 border-b outline-none focus:border-blue-500 font-bold text-lg" placeholder="輸入店名">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">分類</label>
                        <input type="text" id="new-menu-category" list="category-list" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：午餐、飲料、早餐">
                        <datalist id="category-list">
                            <option value="早餐">
                            <option value="午餐">
                            <option value="晚餐">
                            <option value="飲料">
                            <option value="點心">
                        </datalist>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">聯絡電話 <span class="font-normal text-gray-300">（選填）</span></label>
                        <input type="tel" id="new-menu-phone" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：02-1234-5678">
                    </div>
                    <button id="save-btn" onclick="saveToDatabase()" class="mt-auto bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-all flex items-center justify-center">
                        <span class="mr-2">💾</span> 儲存到資料庫
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black/85 z-[100] flex items-center justify-center p-4" onclick="closeImageModal()">
        <img id="modal-img" class="max-w-full max-h-full rounded-xl shadow-2xl object-contain">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBH5fDWcjYaWeppYe1WzohCd1F9UsNPUY",
            authDomain: "orde-4ceae.firebaseapp.com",
            projectId: "orde-4ceae",
            storageBucket: "orde-4ceae.firebasestorage.app",
            messagingSenderId: "917609185557",
            appId: "1:917609185557:web:e2d4a4116e1a6e562b291c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let menuLibrary = [];
        let activeMenuIds = [];
        let activeMenus = [];
        let allOrders = [];
        let currentUserName = "";
        let currentImageData = null;
        let editingMenuId = null;
        let libFilter = { category: '全部', search: '' };

        if (localStorage.getItem('darkMode') === '1') document.documentElement.classList.add('dark');

        function toggleDark() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? '1' : '0');
            document.getElementById('dark-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        function resolveActiveMenus() {
            activeMenus = activeMenuIds.map(id => menuLibrary.find(m => m.id === id)).filter(Boolean);
        }

        window.onload = () => {
            document.getElementById('dark-toggle').innerText = localStorage.getItem('darkMode') === '1' ? '☀️' : '🌙';
            updateCartUI();

            db.collection('menus').onSnapshot(snapshot => {
                menuLibrary = snapshot.docs.map(d => d.data()).sort((a, b) => a.id - b.id);
                resolveActiveMenus();
                renderLibrary();
                renderActiveMenu();
            });

            db.doc('settings/activeMenus').onSnapshot(doc => {
                activeMenuIds = doc.exists ? (doc.data().ids || []) : [];
                resolveActiveMenus();
                renderLibrary();
                renderActiveMenu();
                updateCartUI();
            });

            db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                allOrders = snapshot.docs.map(d => ({ ...d.data(), _id: d.id }));
                if (!document.getElementById('view-summary').classList.contains('hidden')) renderSummary();
            });
        };

        function saveUserName() {
            currentUserName = document.getElementById('user-name-input').value.trim();
            updateCartUI();
        }

        function switchView(view) {
            ['user', 'admin', 'summary'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`btn-${v}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('tab-active', 'text-blue-600');
            document.getElementById('cart-bar').style.display = (view === 'user') ? 'flex' : 'none';
            if (view === 'summary') renderSummary();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 1200, maxH = 1200;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImageData = canvas.toDataURL('image/jpeg', 0.75);
                    document.getElementById('image-preview').src = currentImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveToDatabase() {
            const title = document.getElementById('new-menu-title').value.trim();
            const category = document.getElementById('new-menu-category').value.trim() || '未分類';
            if (!title) { alert("請輸入店名。"); return; }
            try {
                const id = editingMenuId !== null ? editingMenuId : Date.now();
                const phone = document.getElementById('new-menu-phone').value.trim() || null;
                await db.collection('menus').doc(String(id)).set({ id, title, category, phone, imageData: currentImageData || null });
                cancelEdit();
                alert('儲存成功！');
            } catch (e) {
                alert("儲存失敗，請確認 Firebase 設定。");
                console.error(e);
            }
        }

        function editMenu(id) {
            const menu = menuLibrary.find(m => m.id === id);
            if (!menu) return;
            editingMenuId = id;
            document.getElementById('new-menu-title').value = menu.title;
            document.getElementById('new-menu-category').value = menu.category || '';
            document.getElementById('new-menu-phone').value = menu.phone || '';
            currentImageData = menu.imageData || null;
            if (currentImageData) {
                document.getElementById('image-preview').src = currentImageData;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            } else {
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('upload-placeholder').classList.remove('hidden');
            }
            document.getElementById('form-title').innerHTML = '<span class="mr-2">✏️</span> 編輯菜單';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 更新菜單';
            openMenuModal();
        }

        function openMenuModal() {
            document.getElementById('menu-form-modal').classList.remove('hidden');
        }

        function closeMenuModal() {
            document.getElementById('menu-form-modal').classList.add('hidden');
        }

        function handleModalBackdrop(e) {
            if (e.target === document.getElementById('menu-form-modal')) cancelEdit();
        }

        function cancelEdit() {
            editingMenuId = null;
            currentImageData = null;
            document.getElementById('new-menu-title').value = '';
            document.getElementById('new-menu-category').value = '';
            document.getElementById('new-menu-phone').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('form-title').innerHTML = '<span class="mr-2">➕</span> 新增菜單';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 儲存到資料庫';
            closeMenuModal();
        }

        function filterLibrary() {
            libFilter.search = document.getElementById('lib-search').value.trim().toLowerCase();
            renderLibrary();
        }

        function setLibCategoryFilter(cat) {
            libFilter.category = cat;
            renderLibrary();
        }

        function renderLibrary() {
            const list = document.getElementById('database-list');
            const tabsContainer = document.getElementById('lib-category-tabs');

            // Build category tabs
            const cats = ['全部', ...new Set(menuLibrary.map(m => m.category || '未分類'))];
            tabsContainer.innerHTML = cats.map(cat => `
                <button onclick="setLibCategoryFilter('${cat}')"
                    class="text-xs font-bold px-3 py-1 rounded-full transition-colors ${libFilter.category === cat ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
                    ${cat}
                </button>`).join('');

            // Filter menus
            let filtered = menuLibrary;
            if (libFilter.category !== '全部') filtered = filtered.filter(m => (m.category || '未分類') === libFilter.category);
            if (libFilter.search) filtered = filtered.filter(m => m.title.toLowerCase().includes(libFilter.search));

            if (filtered.length === 0) {
                list.innerHTML = `<div class="py-10 text-center text-gray-400">${menuLibrary.length === 0 ? '資料庫是空的' : '找不到符合的菜單'}</div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3';
            filtered.forEach(menu => {
                const isActive = activeMenuIds.includes(menu.id);
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl border transition-all overflow-hidden ${isActive ? 'menu-card-active shadow-md' : 'border-gray-100'}`;
                card.innerHTML = `
                    ${menu.imageData
                        ? `<img src="${menu.imageData}" class="w-full h-28 object-cover cursor-pointer" onclick="viewMenuImage(menuLibrary.find(m=>m.id===${menu.id}).imageData)">`
                        : `<div class="w-full h-28 bg-gray-100 flex items-center justify-center text-gray-300 text-3xl">📋</div>`}
                    <div class="p-2">
                        <div class="mb-1">
                            <h3 class="font-bold text-gray-800 text-sm leading-snug">${menu.title}</h3>
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] text-gray-400">${menu.category || '未分類'}</span>
                                ${menu.phone ? `<a href="tel:${menu.phone}" class="text-[10px] text-gray-400 hover:text-blue-500">📞 ${menu.phone}</a>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-1 mt-2">
                            <button onclick="toggleActiveMenu(${menu.id})" class="flex-1 text-[11px] py-1.5 rounded-lg font-bold ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}">
                                ${isActive ? '✓ 使用中' : '啟用'}
                            </button>
                            <button onclick="editMenu(${menu.id})" class="px-2 text-blue-300 text-sm">✏️</button>
                            <button onclick="deleteFromLibrary(${menu.id})" class="px-2 text-red-300 text-sm">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            list.innerHTML = '';
            list.appendChild(grid);
        }

        async function toggleActiveMenu(id) {
            const newIds = activeMenuIds.includes(id)
                ? activeMenuIds.filter(i => i !== id)
                : [...activeMenuIds, id];
            await db.doc('settings/activeMenus').set({ ids: newIds });
        }

        async function deleteFromLibrary(id) {
            if (!confirm("確定刪除？")) return;
            await db.collection('menus').doc(String(id)).delete();
            if (activeMenuIds.includes(id))
                await db.doc('settings/activeMenus').set({ ids: activeMenuIds.filter(i => i !== id) });
        }

        function orderRowHTML() {
            return `<div class="flex gap-2 items-center">
                <input type="text" placeholder="品項名稱" oninput="updateCartUI()" class="flex-1 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-blue-300 outline-none">
                <input type="text" placeholder="金額" oninput="updateCartUI()" class="w-20 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-blue-300 outline-none text-center">
                <button onclick="removeOrderRow(this)" class="w-7 h-7 flex-shrink-0 text-gray-200 hover:text-red-400 text-xl leading-none">×</button>
            </div>`;
        }

        function addOrderRow(menuId) {
            const container = document.getElementById(`order-rows-${menuId}`);
            if (!container) return;
            const div = document.createElement('div');
            div.innerHTML = orderRowHTML();
            container.appendChild(div.firstElementChild);
        }

        function removeOrderRow(btn) {
            const container = btn.closest('[id^="order-rows-"]');
            if (container && container.children.length > 1) {
                btn.closest('.flex').remove();
                updateCartUI();
            }
        }

        function renderActiveMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            if (activeMenus.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-gray-400">請到菜單管理啟用一份菜單。</div>`;
                updateCartUI();
                return;
            }
            activeMenus.forEach(menu => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden';
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row">
                        <div class="md:w-1/2 relative min-h-[200px]">
                            ${menu.imageData
                                ? `<img src="${menu.imageData}" class="w-full h-full object-cover cursor-pointer min-h-[200px]" onclick="viewMenuImage(activeMenus.find(m=>m.id===${menu.id}).imageData)">`
                                : `<div class="w-full min-h-[200px] h-full bg-gray-100 flex items-center justify-center text-gray-300 text-6xl">📋</div>`}
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full shadow-sm">
                                <span class="text-sm font-black text-gray-800">${menu.title}</span>
                                ${menu.phone ? `<a href="tel:${menu.phone}" class="text-xs text-gray-500 ml-1">📞 ${menu.phone}</a>` : ''}
                            </div>
                            ${menu.imageData ? `<button onclick="viewMenuImage(activeMenus.find(m=>m.id===${menu.id}).imageData)" class="absolute bottom-3 right-3 bg-white/90 backdrop-blur-sm text-xs px-2 py-1 rounded-full font-bold text-gray-600 shadow-sm">🔍 放大</button>` : ''}
                        </div>
                        <div class="md:w-1/2 p-5 flex flex-col">
                            <div class="flex gap-2 text-xs font-bold text-gray-400 mb-2 px-1">
                                <span class="flex-1">品項</span>
                                <span class="w-20 text-center">金額</span>
                                <span class="w-7"></span>
                            </div>
                            <div id="order-rows-${menu.id}" class="space-y-2">
                                ${orderRowHTML()}
                                ${orderRowHTML()}
                            </div>
                            <button onclick="addOrderRow('${menu.id}')" class="mt-3 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 py-2 rounded-xl transition-colors">
                                ＋ 新增品項
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-name-display').innerText = currentUserName || '—';
            const btn = document.getElementById('submit-btn');
            const hasText = activeMenus.some(m => {
                const container = document.getElementById(`order-rows-${m.id}`);
                if (!container) return false;
                return Array.from(container.querySelectorAll('input[placeholder="品項名稱"]')).some(i => i.value.trim());
            });
            btn.disabled = !(currentUserName && hasText);
            btn.innerText = !currentUserName ? "請輸入名字" : (hasText ? "確認送出點餐" : "請輸入點餐內容");
        }

        async function submitOrder() {
            const orders = activeMenus.map(menu => {
                const container = document.getElementById(`order-rows-${menu.id}`);
                if (!container) return null;
                const rows = Array.from(container.children).map(row => {
                    const inputs = row.querySelectorAll('input');
                    return { item: inputs[0]?.value.trim() || '', price: inputs[1]?.value.trim() || '' };
                }).filter(r => r.item);
                if (rows.length === 0) return null;
                const subtotal = rows.reduce((s, r) => s + (parseInt(r.price) || 0), 0);
                const text = rows.map(r => r.price ? `${r.item}　$${r.price}` : r.item).join('\n');
                return { menuTitle: menu.title, text, subtotal };
            }).filter(Boolean);
            if (orders.length === 0) return;
            const grandTotal = orders.reduce((s, o) => s + o.subtotal, 0);
            await db.collection('orders').add({
                user: currentUserName,
                orders,
                grandTotal,
                time: new Date().toLocaleTimeString(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            renderActiveMenu();
            switchView('summary');
        }

        function renderSummary() {
            const container = document.getElementById('order-summary-content');
            if (allOrders.length === 0) { container.innerHTML = '<p class="text-center py-20 text-gray-400">無紀錄</p>'; return; }

            const byMenu = {};
            const menuTotals = {};
            let overallTotal = 0;
            allOrders.forEach(o => {
                overallTotal += o.grandTotal || 0;
                (o.orders || []).forEach(item => {
                    const mt = item.menuTitle || '未分類';
                    if (!byMenu[mt]) byMenu[mt] = [];
                    byMenu[mt].push({ user: o.user, text: item.text });
                    menuTotals[mt] = (menuTotals[mt] || 0) + (item.subtotal || 0);
                });
            });

            let aggHtml = `<div class="bg-gray-900 text-white p-6 rounded-2xl mb-6 space-y-5">`;
            Object.entries(byMenu).forEach(([menuTitle, entries]) => {
                const sorted = [...entries].sort((a, b) => (a.text[0] || '').localeCompare(b.text[0] || '', 'zh-TW'));
                aggHtml += `<div>
                    <div class="flex justify-between items-baseline mb-3">
                        <div class="text-xs text-blue-400 font-bold tracking-widest uppercase">${menuTitle}</div>
                        ${menuTotals[menuTitle] ? `<div class="text-xs text-blue-300 font-bold">小計 NT$${menuTotals[menuTitle]}</div>` : ''}
                    </div>`;
                sorted.forEach(e => {
                    aggHtml += `<div class="border-b border-white/10 pb-2 mb-2">
                        <div class="text-sm whitespace-pre-line text-white/90">${e.text}</div>
                    </div>`;
                });
                aggHtml += '</div>';
            });
            if (overallTotal > 0) {
                aggHtml += `<div class="border-t border-white/20 pt-4 flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-300">全部總計</span>
                    <span class="text-xl font-black text-white">NT$ ${overallTotal}</span>
                </div>`;
            }
            aggHtml += '</div>';

            let ordersHtml = '<div class="space-y-3">';
            allOrders.forEach(o => {
                const list = o.orders || [];
                ordersHtml += `<div class="bg-gray-50 p-4 rounded-xl border">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <b class="text-gray-800">${o.user}</b>
                            ${o.grandTotal ? `<span class="ml-2 text-blue-600 font-black">NT$ ${o.grandTotal}</span>` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-gray-400">${o.time || ''}</span>
                            <button onclick="deleteOrder('${o._id}')" class="text-xs text-red-400 hover:text-red-600 font-bold">✕ 移除</button>
                        </div>
                    </div>
                    ${list.map(item => `
                        <div class="mt-1">
                            <span class="text-xs font-bold text-blue-500">${item.menuTitle}</span>
                            <div class="text-sm text-gray-600 whitespace-pre-line mt-0.5">${item.text}</div>
                        </div>`).join('<hr class="my-2 border-gray-100">')}
                </div>`;
            });
            container.innerHTML = aggHtml + ordersHtml + '</div>';
        }

        function viewMenuImage(src) {
            if (!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        async function deleteOrder(id) {
            if (!confirm("確定移除這筆訂單？")) return;
            await db.collection('orders').doc(id).delete();
        }

        async function clearOrders() {
            if (!confirm("確定清空？")) return;
            const snapshot = await db.collection('orders').get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }
    </script>
</body>
</html>
