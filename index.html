<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐大管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .menu-card-active { border: 2px solid #3b82f6; background-color: #eff6ff; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-32">

    <!-- 導航欄 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 glass-effect">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center">
                <span class="mr-2">🍱</span> 豬仔養成計畫
            </h1>
            <div class="flex space-x-4">
                <button onclick="switchView('user')" id="btn-user" class="text-sm font-medium tab-active py-1 transition-all">我要點餐</button>
                <button onclick="switchView('admin')" id="btn-admin" class="text-sm font-medium text-gray-500 py-1 transition-all">菜單資料庫</button>
                <button onclick="switchView('summary')" id="btn-summary" class="text-sm font-medium text-gray-500 py-1 transition-all">訂單統計</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- 視圖: 用戶點餐 -->
        <section id="view-user" class="block space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="active-menu-name" class="text-xl font-bold text-gray-800">載入中...</h2>
                    <span class="text-xs bg-green-100 text-green-600 px-3 py-1 rounded-full font-bold">供應中</span>
                </div>
                <div class="relative">
                    <label class="text-[10px] font-bold text-blue-500 absolute -top-2 left-3 bg-white px-1">點餐人姓名</label>
                    <input type="text" id="user-name-input" oninput="saveUserName()" class="w-full p-4 rounded-xl bg-gray-50 border border-gray-200 focus:border-blue-400 outline-none transition-all text-lg font-bold" placeholder="請輸入您的名字...">
                </div>
            </div>
            <div id="menu-container" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <!-- 菜單品項將在此生成 -->
            </div>
        </section>

        <!-- 視圖: 資料庫管理 -->
        <section id="view-admin" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                    <span class="bg-blue-100 p-1 rounded mr-2">📸</span> AI 辨識新菜單
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 上傳區 -->
                    <div class="border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center hover:bg-gray-50 transition-colors relative group">
                        <input type="file" id="menu-image" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                        <label for="menu-image" class="cursor-pointer block py-10">
                            <div id="upload-placeholder">
                                <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">🖼️</div>
                                <p class="text-sm font-bold text-blue-600">選擇或拍攝菜單照片</p>
                                <p class="text-xs text-gray-400 mt-1">AI 會自動提取品名與價格</p>
                            </div>
                            <img id="image-preview" class="hidden max-h-64 mx-auto rounded-lg shadow-lg">
                        </label>
                        <!-- AI 載入動畫 -->
                        <div id="ai-loading" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center rounded-2xl z-10">
                            <div class="loader mb-4"></div>
                            <span class="text-sm font-bold text-blue-600">Gemini AI 正在解析圖片...</span>
                            <p class="text-[10px] text-gray-400 mt-2">這通常需要 3-8 秒</p>
                        </div>
                    </div>
                    <!-- 編輯區 -->
                    <div class="flex flex-col space-y-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-1 block uppercase">店鋪名稱</label>
                            <input type="text" id="new-menu-title" class="w-full p-3 bg-gray-50 border-b-2 border-transparent focus:border-blue-500 outline-none transition-all font-bold text-xl" placeholder="例如：泰老饕">
                        </div>
                        <div class="flex-grow">
                            <label class="text-xs font-bold text-gray-400 mb-1 block uppercase">辨識結果 (品名 價格)</label>
                            <textarea id="raw-menu-text" class="w-full h-48 p-4 bg-gray-50 rounded-xl text-sm font-mono leading-relaxed outline-none focus:bg-white border border-transparent focus:border-blue-100 transition-all" placeholder="滷肉飯 35&#10;乾麵 40..."></textarea>
                        </div>
                        <button onclick="saveToDatabase()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center justify-center">
                            <span class="mr-2">💾</span> 儲存到菜單庫
                        </button>
                    </div>
                </div>
            </div>

            <!-- 資料庫列表 -->
            <div class="px-2">
                <h2 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                    <span class="bg-amber-100 p-1 rounded mr-2">📁</span> 我的菜單庫
                </h2>
                <div id="database-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </section>

        <!-- 視圖: 訂單統計 -->
        <section id="view-summary" class="hidden">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">訂單匯總紀錄</h2>
                    <button onclick="clearOrders()" class="text-xs font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition-colors">清空數據</button>
                </div>
                <div id="order-summary-content"></div>
            </div>
        </section>

    </main>

    <!-- 底部購物車欄 -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 glass-effect border-t border-gray-100 px-6 py-5 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <div class="bg-blue-50 p-3 rounded-xl mr-4 text-2xl">🛒</div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">合計金額</p>
                    <p class="text-2xl font-black text-blue-600">NT$ <span id="cart-total">0</span></p>
                </div>
            </div>
            <button id="submit-btn" onclick="submitOrder()" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none transition-all active:scale-95">
                送出訂單
            </button>
        </div>
    </div>

    <script>
        // 配置
        const apiKey = ""; // Canvas 環境中自動提供 Key，設定為空字串
        
        let menuLibrary = JSON.parse(localStorage.getItem('menuLibrary')) || [];
        let activeMenu = JSON.parse(localStorage.getItem('activeMenu')) || null;
        let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        let currentUserName = localStorage.getItem('currentUserName') || "";
        let cart = {};

        window.onload = () => {
            document.getElementById('user-name-input').value = currentUserName;
            renderActiveMenu();
            renderLibrary();
            updateCartUI();
        };

        function saveUserName() {
            currentUserName = document.getElementById('user-name-input').value.trim();
            localStorage.setItem('currentUserName', currentUserName);
            updateCartUI();
        }

        function switchView(view) {
            ['user', 'admin', 'summary'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`btn-${v}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('tab-active', 'text-blue-600');
            document.getElementById('cart-bar').style.display = (view === 'user') ? 'flex' : 'none';
            if (view === 'summary') renderSummary();
        }

        async function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                // 傳遞 Base64 數據（去掉 Data URL 前綴）
                recognizeMenu(e.target.result.split(',')[1]);
            };
            reader.readAsDataURL(file);
        }

        // 核心：修正後的 AI 辨識邏輯，符合 Canvas 環境規範
        async function recognizeMenu(base64Data) {
            const loadingEl = document.getElementById('ai-loading');
            const textOutput = document.getElementById('raw-menu-text');
            const titleInput = document.getElementById('new-menu-title');
            
            loadingEl.classList.remove('hidden');
            textOutput.value = "辨識中...";

            // 在 Canvas 環境中，直接呼叫 generateContent 即可，不需手動拼湊完整 URL
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "你是一個專業的繁體中文菜單分析師。請分析這張圖片並提取店名、品名及價格。請嚴格遵守以下格式：\n第一行輸出：'STORE:店名'\n其餘每行：'品名 價格'\n請直接輸出結果，不要有任何開場白或說明文字。範例：\nSTORE:美味餐飲\n紅燒牛肉麵 150\n滷蛋 15" },
                        { inlineData: { mimeType: "image/png", data: base64Data } }
                    ]
                }]
            };

            async function callApi(attempt) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorBody = await response.json();
                        throw new Error(`API 錯誤: ${response.status} - ${errorBody.error?.message || JSON.stringify(errorBody)}`);
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (error) {
                    if (attempt < 5) {
                        const delay = Math.pow(2, attempt) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return callApi(attempt + 1);
                    }
                    throw error;
                }
            }

            try {
                const finalResult = await callApi(0);
                
                if (finalResult) {
                    const lines = finalResult.split('\n').filter(l => l.trim() !== "");
                    const storeLine = lines.find(l => l.includes('STORE:'));
                    
                    if (storeLine) {
                        titleInput.value = storeLine.split(':')[1].trim();
                        textOutput.value = lines.filter(l => !l.includes('STORE:')).join('\n');
                    } else {
                        textOutput.value = finalResult;
                    }
                }
            } catch (err) {
                console.error("辨識過程最終失敗：", err);
                textOutput.value = "";
                alert("AI 辨識連線失敗。請確認網路狀況，或稍後再試。");
            } finally {
                loadingEl.classList.add('hidden');
            }
        }

        function saveToDatabase() {
            const title = document.getElementById('new-menu-title').value.trim();
            const rawText = document.getElementById('raw-menu-text').value.trim();
            
            if (!title || !rawText) {
                alert("請輸入店名與菜單內容！");
                return;
            }

            const items = rawText.split('\n').map(line => {
                const parts = line.trim().split(/\s+/);
                if (parts.length < 2) return null;
                const priceStr = parts.pop().replace(/[^0-9]/g, "");
                const price = parseInt(priceStr) || 0;
                return { name: parts.join(" "), price };
            }).filter(i => i !== null);

            if (items.length === 0) {
                alert("格式錯誤。請確保每行格式為：品名 價格");
                return;
            }

            const newMenu = { id: Date.now(), title, items };
            menuLibrary.unshift(newMenu);
            localStorage.setItem('menuLibrary', JSON.stringify(menuLibrary));
            
            document.getElementById('new-menu-title').value = "";
            document.getElementById('raw-menu-text').value = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            
            renderLibrary();
            alert("菜單已成功加入資料庫！");
        }

        function renderLibrary() {
            const list = document.getElementById('database-list');
            list.innerHTML = '';
            
            if (menuLibrary.length === 0) {
                list.innerHTML = '<div class="col-span-full py-12 text-center text-gray-400">目前還沒有收藏任何菜單</div>';
                return;
            }

            menuLibrary.forEach(menu => {
                const isActive = activeMenu && activeMenu.id === menu.id;
                const div = document.createElement('div');
                div.className = `bg-white p-5 rounded-2xl border-2 transition-all ${isActive ? 'border-blue-500 bg-blue-50 shadow-md' : 'border-gray-100 hover:border-gray-200'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-gray-800">${menu.title}</h3>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${menu.items.length} 個品項</p>
                        </div>
                        ${isActive ? '<span class="text-[10px] bg-blue-500 text-white px-2 py-1 rounded-md font-bold">使用中</span>' : ''}
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="setActiveMenu(${menu.id})" class="flex-1 py-2 rounded-xl text-xs font-bold transition-all ${isActive ? 'bg-blue-600 text-white shadow-lg' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
                            ${isActive ? '點餐中' : '啟用這份菜單'}
                        </button>
                        <button onclick="deleteMenu(${menu.id})" class="bg-red-50 text-red-400 p-2 rounded-xl hover:bg-red-100 transition-colors">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function setActiveMenu(id) {
            activeMenu = menuLibrary.find(m => m.id === id);
            localStorage.setItem('activeMenu', JSON.stringify(activeMenu));
            cart = {};
            renderActiveMenu();
            renderLibrary();
            switchView('user');
        }

        function deleteMenu(id) {
            if (!confirm("確定要從資料庫移除這份菜單嗎？")) return;
            menuLibrary = menuLibrary.filter(m => m.id !== id);
            localStorage.setItem('menuLibrary', JSON.stringify(menuLibrary));
            if (activeMenu && activeMenu.id === id) {
                activeMenu = null;
                localStorage.removeItem('activeMenu');
            }
            renderLibrary();
            renderActiveMenu();
        }

        function renderActiveMenu() {
            const container = document.getElementById('menu-container');
            const titleDisplay = document.getElementById('active-menu-name');
            container.innerHTML = '';

            if (!activeMenu) {
                titleDisplay.innerText = "尚未選擇菜單";
                container.innerHTML = '<div class="col-span-full py-24 text-center text-gray-400">請前往「菜單資料庫」啟用一份菜單開始點餐</div>';
                return;
            }

            titleDisplay.innerText = activeMenu.title;
            activeMenu.items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="mb-3">
                        <h4 class="font-bold text-gray-800 text-sm mb-1">${item.name}</h4>
                        <p class="text-blue-600 font-black">$${item.price}</p>
                    </div>
                    <div class="flex items-center justify-between bg-gray-50 rounded-xl p-1">
                        <button onclick="updateCart(${idx}, -1)" class="w-10 h-10 flex items-center justify-center font-bold text-gray-400 hover:text-red-500">-</button>
                        <span class="text-sm font-black" id="qty-${idx}">${cart[idx] || 0}</span>
                        <button onclick="updateCart(${idx}, 1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-blue-600 font-bold">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
            updateCartUI();
        }

        function updateCart(idx, delta) {
            cart[idx] = (cart[idx] || 0) + delta;
            if (cart[idx] <= 0) delete cart[idx];
            
            const qtyEl = document.getElementById(`qty-${idx}`);
            if (qtyEl) qtyEl.innerText = cart[idx] || 0;
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0;
            let count = 0;
            if (activeMenu) {
                Object.entries(cart).forEach(([idx, qty]) => {
                    total += activeMenu.items[idx].price * qty;
                    count += qty;
                });
            }
            document.getElementById('cart-total').innerText = total.toLocaleString();
            const btn = document.getElementById('submit-btn');
            
            const isReady = currentUserName && count > 0;
            btn.disabled = !isReady;
            
            if (!currentUserName) btn.innerText = "請輸入名字";
            else if (count === 0) btn.innerText = "請選擇餐點";
            else btn.innerText = `確認送出 (${count} 份)`;
        }

        function submitOrder() {
            if (!activeMenu) return;
            const items = Object.entries(cart).map(([idx, qty]) => ({
                name: activeMenu.items[idx].name,
                price: activeMenu.items[idx].price,
                qty: qty
            }));

            const order = {
                user: currentUserName,
                shop: activeMenu.title,
                items: items,
                total: document.getElementById('cart-total').innerText,
                time: new Date().toLocaleString('zh-TW', { hour12: false })
            };

            allOrders.unshift(order);
            localStorage.setItem('allOrders', JSON.stringify(allOrders));
            
            cart = {};
            renderActiveMenu();
            switchView('summary');
        }

        function renderSummary() {
            const container = document.getElementById('order-summary-content');
            if (allOrders.length === 0) {
                container.innerHTML = '<div class="py-20 text-center text-gray-400 font-medium">目前還沒有點餐紀錄</div>';
                return;
            }

            const summary = {};
            allOrders.forEach(order => {
                order.items.forEach(item => {
                    summary[item.name] = (summary[item.name] || 0) + item.qty;
                });
            });

            let html = `
                <div class="bg-gray-900 text-white p-6 rounded-2xl mb-8 shadow-xl">
                    <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">今日總計清單</h3>
                    <div class="space-y-2">
                        ${Object.entries(summary).map(([name, qty]) => `
                            <div class="flex justify-between items-center border-b border-white/10 pb-2">
                                <span class="text-gray-200">${name}</span>
                                <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg font-bold">x ${qty}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest px-2">詳細訂單紀錄</h3>
            `;

            allOrders.forEach(o => {
                html += `
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-gray-800 text-lg">${o.user}</span>
                            <span class="text-xs text-gray-400">${o.time}</span>
                        </div>
                        <div class="text-sm text-gray-500 mb-2">
                            ${o.items.map(i => `${i.name} x${i.qty}`).join(', ')}
                        </div>
                        <div class="text-right font-black text-blue-600">NT$ ${o.total}</div>
                    </div>
                `;
            });

            container.innerHTML = html + "</div>";
        }

        function clearOrders() {
            if (confirm("這會刪除所有統計紀錄，確定嗎？")) {
                allOrders = [];
                localStorage.setItem('allOrders', JSON.stringify(allOrders));
                renderSummary();
            }
        }
    </script>
</body>
</html>
