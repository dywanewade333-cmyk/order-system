<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .menu-card-active { border: 2px solid #3b82f6; background-color: #eff6ff; }

        html.dark body { background-color: #0f172a; color: #f1f5f9; }
        html.dark nav { background-color: #1e293b !important; }
        html.dark .bg-white { background-color: #1e293b !important; }
        html.dark .bg-gray-50 { background-color: #0f172a !important; }
        html.dark .bg-gray-100 { background-color: #334155 !important; }
        html.dark #cart-bar { background-color: rgba(30,41,59,0.9) !important; border-color: #334155 !important; }
        html.dark .text-gray-800 { color: #f1f5f9 !important; }
        html.dark .text-gray-700 { color: #e2e8f0 !important; }
        html.dark .text-gray-600 { color: #cbd5e1 !important; }
        html.dark .text-gray-500 { color: #94a3b8 !important; }
        html.dark .text-gray-400 { color: #475569 !important; }
        html.dark .border-gray-200 { border-color: #334155 !important; }
        html.dark .border-gray-100 { border-color: #1e293b !important; }
        html.dark .border-b { border-color: #334155 !important; }
        html.dark .border-dashed { border-color: #334155 !important; }
        html.dark .ring-1 { --tw-ring-color: #334155 !important; }
        html.dark input, html.dark textarea { background-color: #0f172a !important; color: #f1f5f9 !important; }
        html.dark input::placeholder, html.dark textarea::placeholder { color: #475569 !important; }
        html.dark .menu-card-active { background-color: #1e3a5f !important; }
        html.dark .hover\:bg-gray-50:hover { background-color: #253146 !important; }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center">
                <span class="mr-2">🗃️</span> 豬仔養成計畫
            </h1>
            <div class="flex items-center space-x-4">
                <button onclick="switchView('user')" id="btn-user" class="text-sm font-medium tab-active py-1">我要點餐</button>
                <button onclick="switchView('admin')" id="btn-admin" class="text-sm font-medium text-gray-500 py-1">菜單資料庫</button>
                <button onclick="switchView('summary')" id="btn-summary" class="text-sm font-medium text-gray-500 py-1">訂單統計</button>
                <button id="dark-toggle" onclick="toggleDark()" class="text-lg leading-none">🌙</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">

        <!-- View: User (點餐) -->
        <section id="view-user" class="block">
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="active-menu-name" class="text-3xl font-black text-gray-800 italic">尚未載入菜單</h2>
                    <div class="flex items-center gap-2">
                        <span id="menu-img-btns"></span>
                        <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">今日供應中</span>
                    </div>
                </div>
                <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-widest">你的名字</label>
                <input type="text" id="user-name-input" oninput="saveUserName()" class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-400 outline-none transition-all text-lg font-bold" placeholder="輸入名字開始點餐...">
            </div>
            <div id="menu-container" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </section>

        <!-- View: Admin (資料庫管理) -->
        <section id="view-admin" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="form-title" class="text-lg font-bold flex items-center"><span class="mr-2">➕</span> 新增菜單到資料庫</h2>
                    <button id="cancel-edit-btn" onclick="cancelEdit()" class="hidden text-xs font-bold text-gray-400 bg-gray-100 px-3 py-1 rounded-full">取消編輯</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:bg-gray-50 transition-colors">
                        <input type="file" id="menu-image" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                        <label for="menu-image" class="cursor-pointer block py-8">
                            <div id="upload-placeholder">
                                <div class="text-4xl mb-2">📸</div>
                                <p class="text-sm font-bold text-blue-600">上傳菜單圖片</p>
                                <p class="text-xs text-gray-400 mt-1">點此選取或拍照</p>
                            </div>
                            <img id="image-preview" class="hidden max-h-48 mx-auto rounded shadow-sm">
                        </label>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-400 mb-1">店名</label>
                        <input type="text" id="new-menu-title" class="w-full p-2 border-b mb-3 outline-none focus:border-blue-500 font-bold text-lg" placeholder="輸入店名">
                        <label class="text-xs font-bold text-gray-400 mb-1">分類</label>
                        <input type="text" id="new-menu-category" list="category-list" class="w-full p-2 border-b mb-4 outline-none focus:border-blue-500 text-sm" placeholder="例：午餐、飲料、早餐">
                        <datalist id="category-list">
                            <option value="早餐">
                            <option value="午餐">
                            <option value="晚餐">
                            <option value="飲料">
                            <option value="點心">
                        </datalist>
                        <label class="text-xs font-bold text-gray-400 mb-1">品項清單（一般：品名 價格 ／ 多規格：品名 大65/小50）</label>
                        <textarea id="raw-menu-text" class="flex-grow w-full h-48 p-3 bg-gray-50 rounded-lg text-xs font-mono outline-none focus:bg-white border border-transparent focus:border-blue-200" placeholder="滷肉飯 35&#10;排骨飯 70&#10;珍珠奶茶 大65/小50&#10;美式咖啡 熱55/冰60"></textarea>
                        <button id="save-btn" onclick="saveToDatabase()" class="mt-4 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition-all shadow-lg shadow-green-100 flex items-center justify-center">
                            <span class="mr-2">💾</span> 儲存到我的資料庫
                        </button>
                    </div>
                </div>
            </div>
            <h2 class="text-lg font-bold mb-4 flex items-center px-2 text-gray-700"><span class="mr-2">📁</span> 我的菜單資料庫</h2>
            <div id="database-list" class="space-y-6"></div>
        </section>

        <!-- View: Summary (統計) -->
        <section id="view-summary" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">訂單統計總覽</h2>
                    <button onclick="clearOrders()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">清空紀錄</button>
                </div>
                <div id="order-summary-content"></div>
            </div>
        </section>

    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-6 py-4 shadow-2xl z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-black uppercase">目前總計</p>
                <p class="text-2xl font-black text-blue-600">NT$ <span id="cart-total">0</span></p>
            </div>
            <button id="submit-btn" onclick="submitOrder()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95">
                送出點餐
            </button>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black/85 z-[100] flex items-center justify-center p-4" onclick="closeImageModal()">
        <img id="modal-img" class="max-w-full max-h-full rounded-xl shadow-2xl object-contain">
    </div>

    <script>
        // ==============================
        // 🔧 Firebase 設定
        // ==============================
        const firebaseConfig = {
            apiKey: "AIzaSyCBH5fDWcjYaWeppYe1WzohCd1F9UsNPUY",
            authDomain: "orde-4ceae.firebaseapp.com",
            projectId: "orde-4ceae",
            storageBucket: "orde-4ceae.firebasestorage.app",
            messagingSenderId: "917609185557",
            appId: "1:917609185557:web:e2d4a4116e1a6e562b291c"
        };
        // ==============================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let menuLibrary = [];
        let activeMenuIds = [];   // 多選啟用
        let activeMenus = [];
        let allOrders = [];
        let currentUserName = "";
        let currentImageData = null;
        let cart = {};       // key: `${menuId}_${itemIdx}` 或 `${menuId}_${itemIdx}_v${vi}`
        let cartOptions = {}; // key: `${menuId}_${itemIdx}` → { sugar, ice }
        let editingMenuId = null;

        if (localStorage.getItem('darkMode') === '1') document.documentElement.classList.add('dark');

        function toggleDark() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? '1' : '0');
            document.getElementById('dark-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        function resolveActiveMenus() {
            activeMenus = activeMenuIds.map(id => menuLibrary.find(m => m.id === id)).filter(Boolean);
        }

        // 解析品項行：支援 "品名 價格" 或 "品名 大65/小50"
        function parseLine(line) {
            const t = line.trim();
            if (!t) return null;
            const vm = t.match(/^(.+?)\s+((?:[^\d\s\/]+\d+)(?:\/[^\d\s\/]+\d+)+)$/);
            if (vm) {
                const name = vm[1].trim();
                const variants = vm[2].split('/').map(v => {
                    const m = v.match(/^([^\d]+)(\d+)$/);
                    return m ? { size: m[1].trim(), price: parseInt(m[2]) } : null;
                }).filter(Boolean);
                if (variants.length >= 2) return { name, variants };
            }
            const parts = t.split(/\s+/);
            if (parts.length < 2) return null;
            const price = parseInt(parts.pop().replace(/[^0-9]/g, '')) || 0;
            const name = parts.join(' ');
            return name ? { name, price } : null;
        }

        function itemToText(item) {
            if (item.variants) return `${item.name} ${item.variants.map(v => `${v.size}${v.price}`).join('/')}`;
            return `${item.name} ${item.price}`;
        }

        function getCartItemInfo(key) {
            const parts = key.split('_');
            const menuId = parseInt(parts[0]);
            const itemIdx = parseInt(parts[1]);
            const isVariant = parts.length > 2;
            const variantIdx = isVariant ? parseInt(parts[2].replace('v', '')) : null;
            const menu = activeMenus.find(m => m.id === menuId);
            if (!menu) return null;
            const item = menu.items[itemIdx];
            if (!item) return null;
            if (isVariant && item.variants) {
                const v = item.variants[variantIdx];
                return v ? { name: `${item.name}(${v.size})`, price: v.price } : null;
            }
            return { name: item.name, price: item.price };
        }

        window.onload = () => {
            document.getElementById('dark-toggle').innerText = localStorage.getItem('darkMode') === '1' ? '☀️' : '🌙';
            updateCartUI();

            db.collection('menus').onSnapshot(snapshot => {
                menuLibrary = snapshot.docs.map(d => d.data()).sort((a, b) => a.id - b.id);
                resolveActiveMenus();
                renderLibrary();
                renderActiveMenu();
            });

            db.doc('settings/activeMenus').onSnapshot(doc => {
                activeMenuIds = doc.exists ? (doc.data().ids || []) : [];
                resolveActiveMenus();
                cart = {};
                cartOptions = {};
                renderLibrary();
                renderActiveMenu();
                updateCartUI();
            });

            db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                allOrders = snapshot.docs.map(d => ({ ...d.data(), _id: d.id }));
                if (!document.getElementById('view-summary').classList.contains('hidden')) renderSummary();
            });
        };

        function saveUserName() {
            currentUserName = document.getElementById('user-name-input').value.trim();
            updateCartUI();
        }

        function switchView(view) {
            ['user', 'admin', 'summary'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`btn-${v}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('tab-active', 'text-blue-600');
            document.getElementById('cart-bar').style.display = (view === 'user') ? 'flex' : 'none';
            if (view === 'summary') renderSummary();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 1200, maxH = 1200;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImageData = canvas.toDataURL('image/jpeg', 0.75);
                    document.getElementById('image-preview').src = currentImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveToDatabase() {
            const title = document.getElementById('new-menu-title').value.trim();
            const category = document.getElementById('new-menu-category').value.trim() || '未分類';
            const rawText = document.getElementById('raw-menu-text').value.trim();
            if (!title || !rawText) { alert("請確保已有店名與品項內容。"); return; }
            const items = rawText.split('\n').map(parseLine).filter(Boolean);
            if (items.length === 0) { alert("格式解析失敗，請確認格式。"); return; }
            try {
                const id = editingMenuId !== null ? editingMenuId : Date.now();
                await db.collection('menus').doc(String(id)).set({ id, title, category, items, imageData: currentImageData || null });
                cancelEdit();
                alert("儲存成功！");
            } catch (e) {
                alert("儲存失敗，請確認 Firebase 設定。");
                console.error(e);
            }
        }

        function editMenu(id) {
            const menu = menuLibrary.find(m => m.id === id);
            if (!menu) return;
            editingMenuId = id;
            document.getElementById('new-menu-title').value = menu.title;
            document.getElementById('new-menu-category').value = menu.category || '';
            document.getElementById('raw-menu-text').value = menu.items.map(itemToText).join('\n');
            currentImageData = menu.imageData || null;
            if (currentImageData) {
                document.getElementById('image-preview').src = currentImageData;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            } else {
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('upload-placeholder').classList.remove('hidden');
            }
            document.getElementById('form-title').innerHTML = '<span class="mr-2">✏️</span> 編輯菜單';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 更新菜單';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            document.getElementById('view-admin').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            editingMenuId = null;
            currentImageData = null;
            document.getElementById('new-menu-title').value = '';
            document.getElementById('new-menu-category').value = '';
            document.getElementById('raw-menu-text').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('form-title').innerHTML = '<span class="mr-2">➕</span> 新增菜單到資料庫';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 儲存到我的資料庫';
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        function renderLibrary() {
            const list = document.getElementById('database-list');
            if (menuLibrary.length === 0) { list.innerHTML = `<div class="py-10 text-center text-gray-400">資料庫是空的</div>`; return; }
            const groups = {};
            menuLibrary.forEach(menu => {
                const cat = menu.category || '未分類';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(menu);
            });
            list.innerHTML = '';
            Object.entries(groups).forEach(([cat, menus]) => {
                const section = document.createElement('div');
                section.innerHTML = `<h3 class="text-sm font-bold text-gray-500 mb-3 flex items-center"><span class="w-2 h-2 rounded-full bg-blue-400 mr-2 inline-block"></span>${cat}</h3>`;
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
                menus.forEach(menu => {
                    const isActive = activeMenuIds.includes(menu.id);
                    const card = document.createElement('div');
                    card.className = `bg-white p-4 rounded-xl border transition-all ${isActive ? 'menu-card-active shadow-md' : 'border-gray-100'}`;
                    card.innerHTML = `
                        ${menu.imageData ? `<img src="${menu.imageData}" class="w-full h-24 object-cover rounded-lg mb-2 cursor-pointer" onclick="viewMenuImage(menuLibrary.find(m=>m.id===${menu.id}).imageData)">` : ''}
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-gray-800">${menu.title}</h3>
                            <span class="text-[10px] text-gray-400">${menu.items.length} 品項</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="toggleActiveMenu(${menu.id})" class="flex-1 text-xs py-2 rounded-lg font-bold ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}">
                                ${isActive ? '✓ 使用中' : '啟用'}
                            </button>
                            <button onclick="editMenu(${menu.id})" class="p-2 text-blue-300">✏️</button>
                            <button onclick="deleteFromLibrary(${menu.id})" class="p-2 text-red-300">🗑️</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                list.appendChild(section);
            });
        }

        async function toggleActiveMenu(id) {
            const newIds = activeMenuIds.includes(id)
                ? activeMenuIds.filter(i => i !== id)
                : [...activeMenuIds, id];
            await db.doc('settings/activeMenus').set({ ids: newIds });
        }

        async function deleteFromLibrary(id) {
            if (!confirm("確定刪除？")) return;
            await db.collection('menus').doc(String(id)).delete();
            if (activeMenuIds.includes(id))
                await db.doc('settings/activeMenus').set({ ids: activeMenuIds.filter(i => i !== id) });
        }

        function drinkOptHTML(itemKey) {
            const opts = cartOptions[itemKey] || { sugar: '全糖', ice: '正常冰' };
            const sugars = ['全糖','8分糖','半糖','微糖','1分糖','無糖'];
            const ices = ['正常冰','少冰','微冰','去冰'];
            const sel = (arr, cur) => arr.map(s => `<option${s===cur?' selected':''}>${s}</option>`).join('');
            return `<div class="mt-2 flex gap-1">
                <select onchange="setDrinkOpt('${itemKey}','sugar',this.value)" class="flex-1 text-xs rounded-lg border border-gray-200 bg-gray-50 p-1 outline-none">${sel(sugars,opts.sugar)}</select>
                <select onchange="setDrinkOpt('${itemKey}','ice',this.value)" class="flex-1 text-xs rounded-lg border border-gray-200 bg-gray-50 p-1 outline-none">${sel(ices,opts.ice)}</select>
            </div>`;
        }

        function setDrinkOpt(itemKey, field, value) {
            if (!cartOptions[itemKey]) cartOptions[itemKey] = { sugar: '全糖', ice: '正常冰' };
            cartOptions[itemKey][field] = value;
        }

        function renderActiveMenu() {
            const container = document.getElementById('menu-container');
            const titleDisplay = document.getElementById('active-menu-name');
            container.innerHTML = '';
            if (activeMenus.length === 0) {
                titleDisplay.innerText = "尚未選擇菜單";
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400">請到菜單資料庫啟用一份菜單。</div>`;
                updateCartUI();
                return;
            }
            titleDisplay.innerText = activeMenus.map(m => m.title).join(' · ');
            const imgBtns = document.getElementById('menu-img-btns');
            if (activeMenus.length === 1 && activeMenus[0].imageData) {
                imgBtns.innerHTML = `<button onclick="viewMenuImage(activeMenus[0].imageData)" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full font-bold">📷 菜單圖片</button>`;
            } else {
                imgBtns.innerHTML = '';
            }
            activeMenus.forEach(menu => {
                const isDrink = menu.category === '飲料';
                if (activeMenus.length > 1) {
                    const header = document.createElement('div');
                    header.className = 'col-span-full flex items-center justify-between text-xs font-bold text-gray-400 mt-3 mb-1 pb-1 border-b tracking-widest';
                    header.innerHTML = `<span class="uppercase">${menu.title}</span>${menu.imageData ? `<button onclick="viewMenuImage(activeMenus.find(m=>m.id===${menu.id}).imageData)" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-full normal-case font-bold">📷 圖片</button>` : ''}`;
                    container.appendChild(header);
                }
                menu.items.forEach((item, idx) => {
                    const card = document.createElement('div');
                    const itemKey = `${menu.id}_${idx}`;
                    if (item.variants) {
                        card.className = "bg-white p-4 rounded-xl border border-gray-100";
                        const rows = item.variants.map((v, vi) => {
                            const key = `${menu.id}_${idx}_v${vi}`;
                            return `<div class="flex items-center justify-between mt-2">
                                <span class="text-xs text-gray-600">${v.size} <span class="font-black text-blue-600">$${v.price}</span></span>
                                <div class="flex items-center bg-gray-50 rounded-lg px-1">
                                    <button onclick="addToCart('${key}',-1)" class="w-7 h-7 text-sm">-</button>
                                    <span class="text-xs font-bold w-5 text-center" id="qty-${key}">${cart[key]||0}</span>
                                    <button onclick="addToCart('${key}',1)" class="w-7 h-7 text-sm bg-white rounded shadow-sm text-blue-600">+</button>
                                </div>
                            </div>`;
                        }).join('');
                        card.innerHTML = `<h4 class="font-bold text-gray-800 text-sm line-clamp-2">${item.name}</h4>${rows}${isDrink ? drinkOptHTML(itemKey) : ''}`;
                    } else {
                        card.className = "bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between";
                        card.innerHTML = `
                            <div><h4 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">${item.name}</h4><p class="text-blue-600 font-black mb-3">$${item.price}</p></div>
                            <div>
                                <div class="flex items-center justify-between bg-gray-50 rounded-lg p-1">
                                    <button onclick="addToCart('${itemKey}',-1)" class="w-8 h-8">-</button>
                                    <span class="text-sm font-bold" id="qty-${itemKey}">${cart[itemKey]||0}</span>
                                    <button onclick="addToCart('${itemKey}',1)" class="w-8 h-8 bg-white rounded shadow-sm text-blue-600">+</button>
                                </div>
                                ${isDrink ? drinkOptHTML(itemKey) : ''}
                            </div>`;
                    }
                    container.appendChild(card);
                });
            });
            updateCartUI();
        }

        function addToCart(key, change) {
            cart[key] = (cart[key] || 0) + change;
            if (cart[key] <= 0) delete cart[key];
            const el = document.getElementById(`qty-${key}`);
            if (el) el.innerText = cart[key] || 0;
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, count = 0;
            Object.entries(cart).forEach(([key, qty]) => {
                const info = getCartItemInfo(key);
                if (!info) return;
                total += info.price * qty;
                count += qty;
            });
            document.getElementById('cart-total').innerText = total;
            const btn = document.getElementById('submit-btn');
            btn.disabled = !(currentUserName && count > 0);
            btn.innerText = !currentUserName ? "請輸入名字" : (count > 0 ? "確認送出點餐" : "請選擇餐點");
        }

        async function submitOrder() {
            const items = Object.entries(cart).map(([key, qty]) => {
                const info = getCartItemInfo(key);
                if (!info) return null;
                const parts = key.split('_');
                const menuId = parseInt(parts[0]);
                const itemIdx = parseInt(parts[1]);
                const menu = activeMenus.find(m => m.id === menuId);
                const isDrink = menu && menu.category === '飲料';
                const optKey = `${menuId}_${itemIdx}`;
                const opts = cartOptions[optKey] || { sugar: '全糖', ice: '正常冰' };
                const name = isDrink ? `${info.name}／${opts.sugar}／${opts.ice}` : info.name;
                return { name, price: info.price, qty, menuTitle: menu ? menu.title : '未分類' };
            }).filter(Boolean);
            await db.collection('orders').add({
                user: currentUserName,
                items,
                total: document.getElementById('cart-total').innerText,
                time: new Date().toLocaleTimeString(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            cart = {};
            cartOptions = {};
            renderActiveMenu();
            switchView('summary');
        }

        function renderSummary() {
            const container = document.getElementById('order-summary-content');
            if (allOrders.length === 0) { container.innerHTML = '<p class="text-center py-20 text-gray-400">無紀錄</p>'; return; }
            const byMenu = {};
            allOrders.forEach(o => o.items.forEach(i => {
                const mt = i.menuTitle || '未分類';
                if (!byMenu[mt]) byMenu[mt] = {};
                byMenu[mt][i.name] = (byMenu[mt][i.name] || 0) + i.qty;
            }));
            let aggHtml = '<div class="bg-gray-900 text-white p-6 rounded-2xl mb-6 space-y-4">';
            Object.entries(byMenu).forEach(([menuTitle, items]) => {
                aggHtml += `<div><div class="text-xs text-blue-400 font-bold mb-2 tracking-widest">${menuTitle}</div>`;
                Object.entries(items).forEach(([name, qty]) => {
                    aggHtml += `<div class="flex justify-between border-b border-white/10 pb-1 mb-1"><span>${name}</span><span class="font-bold">x${qty}</span></div>`;
                });
                aggHtml += '</div>';
            });
            aggHtml += '</div>';
            let ordersHtml = '<div class="space-y-4">';
            allOrders.forEach(o => {
                ordersHtml += `<div class="bg-gray-50 p-4 rounded-xl border flex justify-between items-start"><div><b>${o.user}</b> <span class="text-blue-600">$${o.total}</span><div class="text-xs text-gray-500 mt-1">${o.items.map(i => `${i.name}x${i.qty}`).join('、')}</div></div><button onclick="deleteOrder('${o._id}')" class="text-xs text-red-400 hover:text-red-600 ml-3 mt-1 flex-shrink-0">✕ 移除</button></div>`;
            });
            container.innerHTML = aggHtml + ordersHtml + '</div>';
        }

        function viewMenuImage(src) {
            if (!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        async function deleteOrder(id) {
            if (!confirm("確定移除這筆訂單？")) return;
            await db.collection('orders').doc(id).delete();
        }

        async function clearOrders() {
            if (!confirm("確定清空？")) return;
            const snapshot = await db.collection('orders').get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }
    </script>
</body>
</html>
