<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%BE%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cubic+11&display=swap');
        body { font-family: 'Cubic 11', sans-serif; background-color: #f5ede0; }
        nav button.tab-active { background-color: #8b5e3c !important; color: #ffffff !important; border-radius: 0.5rem; padding: 0.25rem 0.75rem; }
        html.dark nav button.tab-active { background-color: #c4863c !important; color: #ffffff !important; }
        html.dark nav button:not(.tab-active) { color: #c4a882; }
        .menu-card-active { border: 2px solid #8b5e3c; background-color: #faf0e6; }

        /* ── 奶茶色系 ── */
        .bg-white  { background-color: #fdf8f2 !important; }
        .bg-gray-50 { background-color: #f8f1e8 !important; }
        .bg-gray-100 { background-color: #ede3d6 !important; }
        .bg-gray-900 { background-color: #3c2415 !important; }

        .bg-blue-600 { background-color: #8b5e3c !important; }
        .bg-blue-500 { background-color: #9b6e4c !important; }
        .bg-blue-50  { background-color: #faf0e6 !important; }
        .bg-blue-100 { background-color: #f2e4d4 !important; }
        .text-blue-600 { color: #8b5e3c !important; }
        .text-blue-500 { color: #9b6e4c !important; }
        .text-blue-400 { color: #b8936a !important; }
        .text-blue-300 { color: #c4a882 !important; }
        .hover\:bg-blue-100:hover { background-color: #f2e4d4 !important; }
        .hover\:bg-blue-700:hover { background-color: #7a5234 !important; }
        .border-blue-300 { border-color: #c4a882 !important; }
        .focus\:ring-blue-400:focus { --tw-ring-color: rgba(196,168,130,.5) !important; }
        .focus\:border-blue-300:focus { border-color: #c4a882 !important; }
        .focus\:border-blue-400:focus { border-color: #b8936a !important; }
        .focus\:border-blue-500:focus { border-color: #8b5e3c !important; }
        .shadow-blue-100 { --tw-shadow-color: rgba(244,225,200,.6) !important; }
        .shadow-blue-200 { --tw-shadow-color: rgba(228,205,175,.6) !important; }

        .text-gray-800 { color: #3d2b1f !important; }
        .text-gray-700 { color: #5c4033 !important; }
        .text-gray-600 { color: #7a5c4a !important; }
        .text-gray-500 { color: #9a7a68 !important; }
        .text-gray-400 { color: #b8a090 !important; }
        .text-gray-300 { color: #cdb8a8 !important; }
        .border-gray-200 { border-color: #e8d8c8 !important; }
        .border-gray-100 { border-color: #f0e4d4 !important; }
        .ring-1 { --tw-ring-color: #e8d8c8 !important; }
        .hover\:bg-gray-50:hover  { background-color: #f8f1e8 !important; }
        .hover\:bg-gray-200:hover { background-color: #e0d4c4 !important; }
        .disabled\:bg-gray-200:disabled { background-color: #e0d4c4 !important; }
        .disabled\:bg-gray-300:disabled { background-color: #d4c4b4 !important; }
        .disabled\:text-gray-400:disabled { color: #b8a090 !important; }

        /* ── 深色模式（暖色版）── */
        html.dark body { background-color: #2c1a0e; color: #f5ede0; }
        html.dark nav { background-color: #3c2415 !important; }
        html.dark .bg-white  { background-color: #4a2d1a !important; }
        html.dark .bg-gray-50 { background-color: #2c1a0e !important; }
        html.dark .bg-gray-100 { background-color: #5c3d28 !important; }
        html.dark .text-gray-800 { color: #f5ede0 !important; }
        html.dark .text-gray-700 { color: #ede3d6 !important; }
        html.dark .text-gray-600 { color: #d4c4b4 !important; }
        html.dark .text-gray-500 { color: #c0aa96 !important; }
        html.dark .text-gray-400 { color: #a89684 !important; }
        html.dark .text-gray-300 { color: #8a7666 !important; }
        html.dark .text-blue-600 { color: #e8b878 !important; }
        html.dark .text-blue-500 { color: #d4a070 !important; }
        html.dark .text-blue-400 { color: #c8956a !important; }
        html.dark .text-blue-300 { color: #b8856a !important; }
        html.dark .border-gray-200 { border-color: #5c3d28 !important; }
        html.dark .border-gray-100 { border-color: #3c2415 !important; }
        html.dark .border-b { border-color: #5c3d28 !important; }
        html.dark .border-dashed { border-color: #5c3d28 !important; }
        html.dark .ring-1 { --tw-ring-color: #5c3d28 !important; }
        html.dark input, html.dark textarea { background-color: #2c1a0e !important; color: #f5ede0 !important; }
        html.dark input::placeholder, html.dark textarea::placeholder { color: #a89684 !important; }
        html.dark .disabled\:text-gray-400:disabled { color: #8a7666 !important; }
        html.dark .disabled\:bg-gray-200:disabled { background-color: #3c2815 !important; }
        html.dark .menu-card-active { background-color: #5c3020 !important; }
        html.dark .hover\:bg-gray-50:hover { background-color: #3c2815 !important; }

        .order-row-grid { display: grid; grid-template-columns: 1fr 3rem 4rem 5rem 1.75rem; gap: 0.5rem; align-items: center; }
    </style>
</head>
<body class="pb-6">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center">
                <span class="mr-2">🗃️</span> 豬仔養成計畫
            </h1>
            <div class="flex items-center space-x-4">
                <button onclick="switchView('user')" id="btn-user" class="text-sm font-medium tab-active py-1">🍽️ 我要點餐</button>
                <button onclick="switchView('admin')" id="btn-admin" class="text-sm font-medium text-gray-500 py-1">📋 菜單管理</button>
                <button onclick="switchView('summary')" id="btn-summary" class="text-sm font-medium text-gray-500 py-1">📊 訂單統計</button>
                <button onclick="switchView('calendar')" id="btn-calendar" class="text-sm font-medium text-gray-500 py-1">📅 菜單行事曆</button>
                <button id="dark-toggle" onclick="toggleDark()" class="text-lg leading-none">🌙</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">

        <!-- View: User (點餐) -->
        <section id="view-user" class="block">
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-4 border border-gray-200">
                <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-widest">你的名字</label>
                <input type="text" id="user-name-input" oninput="saveUserName()" class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-400 outline-none transition-all text-lg font-bold" placeholder="輸入名字開始點餐...">
            </div>
            <div id="menu-tabs" class="hidden bg-gray-100 rounded-2xl p-1 flex gap-1 mb-4 flex-wrap"></div>
            <div id="menu-container" class="space-y-4"></div>
        </section>

        <!-- View: Admin (菜單管理) -->
        <section id="view-admin" class="hidden">
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-lg font-bold flex items-center text-gray-700"><span class="mr-2">📁</span> 菜單資料庫</h2>
                <button onclick="openMenuModal()" class="flex items-center gap-2 bg-blue-600 text-white text-sm font-bold px-4 py-2 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                    <span class="text-base leading-none">➕</span> 新增菜單
                </button>
            </div>
            <div class="mb-4 space-y-3">
                <input type="text" id="lib-search" oninput="filterLibrary()" class="w-full p-3 rounded-xl bg-white border border-gray-200 text-sm outline-none focus:border-blue-300" placeholder="🔍 搜尋店名...">
                <div id="lib-category-tabs" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="database-list"></div>
        </section>

        <!-- View: Calendar (行事曆) -->
        <section id="view-calendar" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6 flex-wrap gap-2">
                    <h2 class="text-xl font-black italic flex items-center"><span class="mr-2">📅</span>菜單行事曆</h2>
                    <p class="text-xs text-gray-400">點選每天的「+ 加店家」即可規劃</p>
                </div>
                <div id="calendar-content"></div>
            </div>
        </section>

        <!-- View: Summary (統計) -->
        <section id="view-summary" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">訂單統計總覽</h2>
                    <button onclick="clearOrders()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">清除全部</button>
                </div>
                <div id="order-summary-content"></div>
            </div>
        </section>

    </main>


    <!-- Menu Form Modal -->
    <div id="menu-form-modal" class="hidden fixed inset-0 bg-black/60 z-[90] flex items-center justify-center p-4" onclick="handleModalBackdrop(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl p-6" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h2 id="form-title" class="text-lg font-bold flex items-center"><span class="mr-2">➕</span> 新增菜單</h2>
                <button onclick="cancelEdit()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:bg-gray-50 transition-colors">
                    <input type="file" id="menu-image" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                    <label for="menu-image" class="cursor-pointer block py-6">
                        <div id="upload-placeholder">
                            <div class="text-4xl mb-2">📸</div>
                            <p class="text-sm font-bold text-blue-600">上傳菜單圖片</p>
                            <p class="text-xs text-gray-400 mt-1">點此選取或拍照</p>
                        </div>
                        <img id="image-preview" class="hidden max-h-48 mx-auto rounded shadow-sm">
                    </label>
                </div>
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">店名</label>
                        <input type="text" id="new-menu-title" class="w-full p-2 border-b outline-none focus:border-blue-500 font-bold text-lg" placeholder="輸入店名">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">分類</label>
                        <input type="text" id="new-menu-category" list="category-list" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：午餐、飲料、早餐">
                        <datalist id="category-list">
                            <option value="早餐">
                            <option value="午餐">
                            <option value="晚餐">
                            <option value="飲料">
                            <option value="點心">
                        </datalist>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">聯絡電話 <span class="font-normal text-gray-300">（選填）</span></label>
                        <input type="tel" id="new-menu-phone" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：02-1234-5678">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-1 block">營業時間 <span class="font-normal text-gray-300">（選填）</span></label>
                            <input type="text" id="new-menu-hours" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：10:00–21:00">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 mb-1 block">公休日 <span class="font-normal text-gray-300">（選填）</span></label>
                            <input type="text" id="new-menu-closed" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：週日">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 mb-1 block">店家備注 <span class="font-normal text-gray-300">（選填）</span></label>
                        <input type="text" id="new-menu-note" class="w-full p-2 border-b outline-none focus:border-blue-500 text-sm" placeholder="例：滿200外送、最低消費300">
                    </div>
                    <button id="save-btn" onclick="saveToDatabase()" class="mt-auto bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-all flex items-center justify-center">
                        <span class="mr-2">💾</span> 儲存到資料庫
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Clear Confirm Modal -->
    <div id="clear-modal" class="hidden fixed inset-0 bg-black/50 z-[95] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-xs w-full text-center">
            <div class="text-5xl mb-4">🗑️</div>
            <h3 class="text-lg font-black text-gray-800 mb-2">要確定清除喔！？</h3>
            <p class="text-sm text-gray-400 mb-6">所有訂單紀錄將被永久刪除</p>
            <div class="flex gap-3">
                <button onclick="closeClearModal()" class="flex-1 py-3 rounded-xl font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">取消</button>
                <button onclick="confirmClearOrders()" class="flex-1 py-3 rounded-xl font-bold bg-red-500 text-white hover:bg-red-600 transition-colors">確定清除</button>
            </div>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 bg-black/85 z-[100] flex items-center justify-center p-4" onclick="closeImageModal()">
        <img id="modal-img" class="max-w-full max-h-full rounded-xl shadow-2xl object-contain">
    </div>

    <!-- Calendar Pick Modal -->
    <div id="calendar-pick-modal" class="hidden fixed inset-0 bg-black/60 z-[95] flex items-center justify-center p-4" onclick="closeCalendarPick(event)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 max-h-[80vh] overflow-hidden flex flex-col" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 id="calendar-pick-title" class="text-lg font-black text-gray-800">選擇店家</h3>
                <button onclick="closeCalendarPick()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <div id="calendar-pick-list" class="overflow-y-auto flex-1 space-y-2"></div>
            <button onclick="closeCalendarPick()" class="mt-4 bg-blue-600 text-white py-2.5 rounded-xl font-bold">完成</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBH5fDWcjYaWeppYe1WzohCd1F9UsNPUY",
            authDomain: "orde-4ceae.firebaseapp.com",
            projectId: "orde-4ceae",
            storageBucket: "orde-4ceae.firebasestorage.app",
            messagingSenderId: "917609185557",
            appId: "1:917609185557:web:e2d4a4116e1a6e562b291c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let menuLibrary = [];
        let activeMenuIds = [];
        let activeMenus = [];
        let allOrders = [];
        let currentUserName = "";
        let currentImageData = null;
        let editingMenuId = null;
        let libFilter = { category: '全部', search: '' };
        let activeMenuTab = null;
        let summaryTab = null;
        let summaryMenuTitles = [];
        let changeInputTimers = {};
        let aggregateMode = false;
        let currentSummaryUsers = [];
        let menuCalendar = {};
        let calendarPickDate = null;

        function toggleAggregate() {
            aggregateMode = !aggregateMode;
            renderSummary();
        }

        if (localStorage.getItem('darkMode') === '1') document.documentElement.classList.add('dark');

        function toggleDark() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? '1' : '0');
            document.getElementById('dark-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        function menuEmoji(category) {
            return { '早餐': '🍳', '午餐': '🍱', '晚餐': '🍲', '飲料': '☕', '點心': '🍡', '宵夜': '🌙', '咖啡': '☕' }[category] || '🍴';
        }

        function computeItemSubtotal(item) {
            if (item.rows && item.rows.length) return item.rows.reduce((s, r) => s + (parseInt(r.price) || 0) * (r.qty || 1), 0);
            return item.subtotal || 0;
        }

        function computeOrderTotal(o) {
            return (o.orders || []).reduce((s, item) => s + computeItemSubtotal(item), 0);
        }

        function resolveActiveMenus() {
            activeMenus = activeMenuIds.map(id => menuLibrary.find(m => m.id === id)).filter(Boolean);
        }

        window.onload = () => {
            document.getElementById('dark-toggle').innerText = localStorage.getItem('darkMode') === '1' ? '☀️' : '🌙';
            updateCartUI();

            db.collection('menus').onSnapshot(snapshot => {
                menuLibrary = snapshot.docs.map(d => d.data()).sort((a, b) => a.id - b.id);
                resolveActiveMenus();
                renderLibrary();
                renderActiveMenu();
                if (!document.getElementById('view-calendar').classList.contains('hidden')) renderCalendar();
            });

            db.doc('settings/activeMenus').onSnapshot(doc => {
                activeMenuIds = doc.exists ? (doc.data().ids || []) : [];
                resolveActiveMenus();
                renderLibrary();
                renderActiveMenu();
                updateCartUI();
            });

            db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                allOrders = snapshot.docs.map(d => ({ ...d.data(), _id: d.id }));
                if (!document.getElementById('view-summary').classList.contains('hidden')) renderSummary();
            });

            db.doc('settings/menuCalendar').onSnapshot(doc => {
                menuCalendar = doc.exists ? (doc.data().data || {}) : {};
                if (!document.getElementById('view-calendar').classList.contains('hidden')) renderCalendar();
            });
        };

        function saveUserName() {
            currentUserName = document.getElementById('user-name-input').value.trim();
            updateCartUI();
        }

        function switchView(view) {
            ['user', 'admin', 'summary', 'calendar'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`btn-${v}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.remove('text-gray-500');
            document.getElementById(`btn-${view}`).classList.add('tab-active');
            if (view === 'summary') renderSummary();
            if (view === 'calendar') renderCalendar();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 1200, maxH = 1200;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImageData = canvas.toDataURL('image/jpeg', 0.75);
                    document.getElementById('image-preview').src = currentImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveToDatabase() {
            const title = document.getElementById('new-menu-title').value.trim();
            const category = document.getElementById('new-menu-category').value.trim() || '未分類';
            if (!title) { alert("請輸入店名。"); return; }
            try {
                const id = editingMenuId !== null ? editingMenuId : Date.now();
                const phone = document.getElementById('new-menu-phone').value.trim() || null;
                const hours = document.getElementById('new-menu-hours').value.trim() || null;
                const closedDays = document.getElementById('new-menu-closed').value.trim() || null;
                const note = document.getElementById('new-menu-note').value.trim() || null;
                const data = { id, title, category, phone, hours, closedDays, note, imageData: currentImageData || null };
                if (editingMenuId === null) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('menus').doc(String(id)).set(data);
                cancelEdit();
                alert('儲存成功！');
            } catch (e) {
                alert("儲存失敗，請確認 Firebase 設定。");
                console.error(e);
            }
        }

        function editMenu(id) {
            const menu = menuLibrary.find(m => m.id === id);
            if (!menu) return;
            editingMenuId = id;
            document.getElementById('new-menu-title').value = menu.title;
            document.getElementById('new-menu-category').value = menu.category || '';
            document.getElementById('new-menu-phone').value = menu.phone || '';
            document.getElementById('new-menu-hours').value = menu.hours || '';
            document.getElementById('new-menu-closed').value = menu.closedDays || '';
            document.getElementById('new-menu-note').value = menu.note || '';
            currentImageData = menu.imageData || null;
            if (currentImageData) {
                document.getElementById('image-preview').src = currentImageData;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            } else {
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('upload-placeholder').classList.remove('hidden');
            }
            document.getElementById('form-title').innerHTML = '<span class="mr-2">✏️</span> 編輯菜單';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 更新菜單';
            openMenuModal();
        }

        function openMenuModal() {
            document.getElementById('menu-form-modal').classList.remove('hidden');
        }

        function closeMenuModal() {
            document.getElementById('menu-form-modal').classList.add('hidden');
        }

        function handleModalBackdrop(e) {
            if (e.target === document.getElementById('menu-form-modal')) cancelEdit();
        }

        function cancelEdit() {
            editingMenuId = null;
            currentImageData = null;
            document.getElementById('new-menu-title').value = '';
            document.getElementById('new-menu-category').value = '';
            document.getElementById('new-menu-phone').value = '';
            document.getElementById('new-menu-hours').value = '';
            document.getElementById('new-menu-closed').value = '';
            document.getElementById('new-menu-note').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('form-title').innerHTML = '<span class="mr-2">➕</span> 新增菜單';
            document.getElementById('save-btn').innerHTML = '<span class="mr-2">💾</span> 儲存到資料庫';
            closeMenuModal();
        }

        function filterLibrary() {
            libFilter.search = document.getElementById('lib-search').value.trim().toLowerCase();
            renderLibrary();
        }

        function setLibCategoryFilter(cat) {
            libFilter.category = cat;
            renderLibrary();
        }

        function getMenuDateStr(menu) {
            if (menu.createdAt && menu.createdAt.toDate) return menu.createdAt.toDate().toLocaleDateString('zh-TW');
            if (typeof menu.id === 'number' && menu.id > 1600000000000) return new Date(menu.id).toLocaleDateString('zh-TW');
            return '';
        }

        function renderLibrary() {
            const list = document.getElementById('database-list');
            const tabsContainer = document.getElementById('lib-category-tabs');

            // Build category tabs
            const cats = ['全部', ...new Set(menuLibrary.map(m => m.category || '未分類'))];
            tabsContainer.innerHTML = cats.map(cat => `
                <button onclick="setLibCategoryFilter('${cat}')"
                    class="text-xs font-bold px-3 py-1 rounded-full transition-colors ${libFilter.category === cat ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}">
                    ${cat}
                </button>`).join('');

            // Filter menus
            let filtered = menuLibrary;
            if (libFilter.category !== '全部') filtered = filtered.filter(m => (m.category || '未分類') === libFilter.category);
            if (libFilter.search) filtered = filtered.filter(m => m.title.toLowerCase().includes(libFilter.search));

            if (filtered.length === 0) {
                list.innerHTML = `<div class="py-10 text-center text-gray-400">${menuLibrary.length === 0 ? '資料庫是空的' : '找不到符合的菜單'}</div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3';
            filtered.forEach(menu => {
                const isActive = activeMenuIds.includes(menu.id);
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl border transition-all overflow-hidden ${isActive ? 'menu-card-active shadow-md' : 'border-gray-100'}`;
                card.innerHTML = `
                    ${menu.imageData
                        ? `<img src="${menu.imageData}" class="w-full h-28 object-cover cursor-pointer" onclick="viewMenuImage(menuLibrary.find(m=>m.id===${menu.id}).imageData)">`
                        : `<div class="w-full h-28 bg-gray-100 flex items-center justify-center text-gray-300 text-3xl">📋</div>`}
                    <div class="p-2">
                        <div class="mb-1">
                            <h3 class="font-bold text-gray-800 text-sm leading-snug">${menu.title}</h3>
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] text-gray-400">${menu.category || '未分類'}</span>
                                ${menu.phone ? `<a href="tel:${menu.phone}" class="text-[10px] text-gray-400 hover:text-blue-500">📞 ${menu.phone}</a>` : ''}
                            </div>
                            ${menu.hours ? `<div class="text-[10px] text-gray-400 mt-0.5 truncate">🕐 ${menu.hours}</div>` : ''}
                            ${menu.closedDays ? `<div class="text-[10px] text-gray-400 mt-0.5 truncate">🚫 ${menu.closedDays}</div>` : ''}
                            ${menu.note ? `<div class="text-[10px] text-orange-500 mt-0.5 truncate">📝 ${menu.note}</div>` : ''}
                            ${getMenuDateStr(menu) ? `<div class="text-[10px] text-gray-300 mt-0.5">上傳：${getMenuDateStr(menu)}</div>` : ''}
                        </div>
                        <div class="flex gap-1 mt-2">
                            <button onclick="toggleActiveMenu(${menu.id})" class="flex-1 text-[11px] py-1.5 rounded-lg font-bold ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}">
                                ${isActive ? '✓ 使用中' : '啟用'}
                            </button>
                            <button onclick="editMenu(${menu.id})" class="px-2 text-blue-300 text-sm">✏️</button>
                            <button onclick="deleteFromLibrary(${menu.id})" class="px-2 text-red-300 text-sm">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            list.innerHTML = '';
            list.appendChild(grid);
        }

        async function toggleActiveMenu(id) {
            const newIds = activeMenuIds.includes(id)
                ? activeMenuIds.filter(i => i !== id)
                : [...activeMenuIds, id];
            await db.doc('settings/activeMenus').set({ ids: newIds });
        }

        async function deleteFromLibrary(id) {
            if (!confirm("確定刪除？")) return;
            await db.collection('menus').doc(String(id)).delete();
            if (activeMenuIds.includes(id))
                await db.doc('settings/activeMenus').set({ ids: activeMenuIds.filter(i => i !== id) });
        }

        function orderRowHTML() {
            return `<div class="order-row-grid">
                <input type="text" placeholder="品項名稱" oninput="updateCartUI()" class="min-w-0 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-blue-300 outline-none">
                <input type="number" value="1" min="1" oninput="updateCartUI()" class="min-w-0 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-blue-300 outline-none text-center">
                <input type="text" placeholder="金額" oninput="updateCartUI()" class="min-w-0 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-blue-300 outline-none text-center">
                <input type="text" placeholder="備註" class="min-w-0 p-2 text-sm bg-gray-50 rounded-lg border border-gray-100 focus:border-yellow-300 outline-none">
                <button onclick="removeOrderRow(this)" class="flex-shrink-0 text-gray-200 hover:text-red-400 text-xl leading-none text-center">×</button>
            </div>`;
        }

        function addOrderRow(menuId) {
            const container = document.getElementById(`order-rows-${menuId}`);
            if (!container) return;
            const div = document.createElement('div');
            div.innerHTML = orderRowHTML();
            container.appendChild(div.firstElementChild);
        }

        function removeOrderRow(btn) {
            const container = btn.closest('[id^="order-rows-"]');
            if (container && container.children.length > 1) {
                btn.closest('.order-row-grid').remove();
                updateCartUI();
            }
        }

        function switchMenuTab(id) {
            activeMenuTab = id;
            activeMenus.forEach(m => {
                const card = document.getElementById(`menu-card-${m.id}`);
                if (card) card.classList.toggle('hidden', m.id !== id);
                const tab = document.getElementById(`menu-tab-${m.id}`);
                if (tab) { tab.className = `text-sm font-black px-5 py-2.5 rounded-xl transition-all whitespace-nowrap ${m.id === id ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`; tab.textContent = `${menuEmoji(m.category)} ${m.title}`; }
            });
        }

        function renderActiveMenu() {
            const container = document.getElementById('menu-container');
            const tabsEl = document.getElementById('menu-tabs');
            container.innerHTML = '';
            tabsEl.innerHTML = '';

            if (activeMenus.length === 0) {
                tabsEl.classList.add('hidden');
                container.innerHTML = `<div class="py-20 text-center text-gray-400">請到菜單管理啟用一份菜單。</div>`;
                updateCartUI();
                return;
            }

            if (!activeMenus.find(m => m.id === activeMenuTab)) activeMenuTab = activeMenus[0].id;

            if (activeMenus.length > 1) {
                tabsEl.classList.remove('hidden');
                activeMenus.forEach(menu => {
                    const tab = document.createElement('button');
                    tab.id = `menu-tab-${menu.id}`;
                    tab.onclick = () => switchMenuTab(menu.id);
                    tab.className = `text-sm font-black px-5 py-2.5 rounded-xl transition-all whitespace-nowrap ${menu.id === activeMenuTab ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`;
                    tab.textContent = `${menuEmoji(menu.category)} ${menu.title}`;
                    tabsEl.appendChild(tab);
                });
            } else {
                tabsEl.classList.add('hidden');
            }

            activeMenus.forEach(menu => {
                const card = document.createElement('div');
                card.id = `menu-card-${menu.id}`;
                card.className = `bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden ${menu.id !== activeMenuTab ? 'hidden' : ''}`;
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row">
                        <div class="md:w-1/2 relative min-h-[200px]">
                            ${menu.imageData
                                ? `<img src="${menu.imageData}" class="w-full h-full object-cover cursor-pointer min-h-[200px]" onclick="viewMenuImage(activeMenus.find(m=>m.id===${menu.id}).imageData)">`
                                : `<div class="w-full min-h-[200px] h-full bg-gray-100 flex items-center justify-center text-gray-300 text-6xl">📋</div>`}
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-xl shadow-sm max-w-[70%]">
                                <div class="flex items-center gap-1 flex-wrap">
                                    <span class="text-sm font-black text-gray-800">${menu.title}</span>
                                    ${menu.phone ? `<a href="tel:${menu.phone}" class="text-xs text-gray-500">📞 ${menu.phone}</a>` : ''}
                                </div>
                                ${menu.hours ? `<div class="text-[11px] text-gray-500 mt-0.5">🕐 ${menu.hours}</div>` : ''}
                                ${menu.closedDays ? `<div class="text-[11px] text-gray-500 mt-0.5">🚫 ${menu.closedDays}</div>` : ''}
                                ${menu.note ? `<div class="text-[11px] text-orange-500 font-bold mt-0.5">📝 ${menu.note}</div>` : ''}
                            </div>
                            ${menu.imageData ? `<button onclick="viewMenuImage(activeMenus.find(m=>m.id===${menu.id}).imageData)" class="absolute bottom-3 right-3 bg-white/90 backdrop-blur-sm text-xs px-2 py-1 rounded-full font-bold text-gray-600 shadow-sm">🔍 放大</button>` : ''}
                        </div>
                        <div class="md:w-1/2 p-5 flex flex-col">
                            <div class="order-row-grid text-xs font-bold text-gray-400 mb-2">
                                <span class="pl-1">品項</span>
                                <span class="text-center">數量</span>
                                <span class="text-center">金額</span>
                                <span class="text-center">備註</span>
                                <span></span>
                            </div>
                            <div id="order-rows-${menu.id}" class="space-y-2">
                                ${orderRowHTML()}
                                ${orderRowHTML()}
                            </div>
                            <button onclick="addOrderRow('${menu.id}')" class="mt-3 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 py-2 rounded-xl transition-colors">
                                ＋ 新增品項
                            </button>
                            <button class="in-card-submit mt-2 bg-blue-600 text-white py-2.5 rounded-xl font-black shadow-md shadow-blue-100 disabled:bg-gray-200 disabled:text-gray-400 transition-all text-sm" onclick="submitOrder()" disabled>
                                請輸入名字
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateCartUI();
        }

        function updateCartUI() {
            const hasText = activeMenus.some(m => {
                const container = document.getElementById(`order-rows-${m.id}`);
                if (!container) return false;
                return Array.from(container.querySelectorAll('input[placeholder="品項名稱"]')).some(i => i.value.trim());
            });
            const label = !currentUserName ? "請輸入名字" : (hasText ? "確認送出點餐" : "請輸入點餐內容");
            document.querySelectorAll('.in-card-submit').forEach(b => {
                b.disabled = !(currentUserName && hasText);
                b.innerText = label;
            });
        }

        async function submitOrder() {
            const orders = activeMenus.map(menu => {
                const container = document.getElementById(`order-rows-${menu.id}`);
                if (!container) return null;
                const rows = Array.from(container.children).map(row => {
                    const inputs = row.querySelectorAll('input');
                    return { item: inputs[0]?.value.trim() || '', qty: parseInt(inputs[1]?.value) || 1, price: inputs[2]?.value.trim() || '', note: inputs[3]?.value.trim() || '' };
                }).filter(r => r.item);
                if (rows.length === 0) return null;
                const subtotal = rows.reduce((s, r) => s + (parseInt(r.price) || 0) * r.qty, 0);
                const text = rows.map(r => {
                    let line = r.item;
                    if (r.qty > 1) line += ` x${r.qty}`;
                    if (r.price) line += `　$${r.price}`;
                    if (r.note) line += `（${r.note}）`;
                    return line;
                }).join('\n');
                return { menuTitle: menu.title, text, subtotal, rows };
            }).filter(Boolean);
            if (orders.length === 0) return;
            const grandTotal = orders.reduce((s, o) => s + o.subtotal, 0);
            if (grandTotal > 200 && !confirm('🐷 吃太多會很胖喔～確定要點餐嘛～ 🐷')) return;
            await db.collection('orders').add({
                user: currentUserName,
                orders,
                grandTotal,
                time: new Date().toLocaleTimeString(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            renderActiveMenu();
            switchView('summary');
        }

        function setSummaryTab(idx) {
            summaryTab = summaryMenuTitles[idx];
            renderSummary();
        }

        function renderSummary() {
            const container = document.getElementById('order-summary-content');
            if (allOrders.length === 0) { container.innerHTML = '<p class="text-center py-20 text-gray-400">無紀錄</p>'; return; }

            const byMenu = {};
            const menuTotals = {};
            let overallTotal = 0;
            allOrders.forEach(o => {
                overallTotal += computeOrderTotal(o);
                (o.orders || []).forEach(item => {
                    const mt = item.menuTitle || '未分類';
                    if (!byMenu[mt]) byMenu[mt] = [];
                    byMenu[mt].push({ user: o.user, text: item.text, rows: item.rows, subtotal: computeItemSubtotal(item) });
                    menuTotals[mt] = (menuTotals[mt] || 0) + computeItemSubtotal(item);
                });
            });

            summaryMenuTitles = Object.keys(byMenu);
            if (!summaryTab || !summaryMenuTitles.includes(summaryTab)) summaryTab = summaryMenuTitles[0];
            const multiMenu = summaryMenuTitles.length > 1;

            let aggHtml = `<div class="bg-gray-900 text-white p-6 rounded-2xl mb-4">`;

            if (multiMenu) {
                aggHtml += `<div class="bg-white/10 rounded-2xl p-1 flex gap-1 flex-wrap mb-5">`;
                summaryMenuTitles.forEach((title, idx) => {
                    const active = title === summaryTab;
                    aggHtml += `<button onclick="setSummaryTab(${idx})" class="text-sm font-black px-5 py-2.5 rounded-xl transition-all whitespace-nowrap ${active ? 'bg-blue-500 text-white shadow-md' : 'text-gray-400 hover:text-white'}">${menuEmoji(menuLibrary.find(m=>m.title===title)?.category)} ${title}</button>`;
                });
                aggHtml += `</div>`;
            }

            summaryMenuTitles.forEach(menuTitle => {
                const entries = byMenu[menuTitle];
                const visible = !multiMenu || menuTitle === summaryTab;
                aggHtml += `<div class="${visible ? '' : 'hidden'}">`;
                aggHtml += `<div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <div class="flex items-center gap-2">
                        <div class="text-xs text-blue-400 font-bold tracking-widest uppercase">${multiMenu ? '' : menuTitle}</div>
                        <button onclick="toggleAggregate()" class="text-[11px] font-bold px-2.5 py-1 rounded-full transition-colors ${aggregateMode ? 'bg-blue-500 text-white' : 'bg-white/10 text-blue-300 hover:bg-white/20'}">
                            ${aggregateMode ? '✓ 已合併相同項目' : '🔢 一鍵統計'}
                        </button>
                    </div>
                    ${menuTotals[menuTitle] ? `<div class="text-xs text-blue-300 font-bold">小計 NT$${menuTotals[menuTitle]}</div>` : ''}
                </div>`;

                aggHtml += `<div class="grid gap-3 pb-2 mb-2 border-b border-white/20 text-[11px] font-bold text-blue-400 uppercase tracking-wider" style="grid-template-columns: 1fr 4rem 6rem;">
                    <div>品項</div>
                    <div class="text-center">數量</div>
                    <div class="text-right">金額</div>
                </div>`;

                if (aggregateMode) {
                    const groups = {};
                    const legacyEntries = [];
                    entries.forEach(e => {
                        if (e.rows && e.rows.length) {
                            e.rows.forEach(r => {
                                const key = r.item;
                                if (!groups[key]) groups[key] = { item: r.item, notes: [], qty: 0, total: 0 };
                                groups[key].qty += r.qty || 1;
                                groups[key].total += (parseInt(r.price) || 0) * (r.qty || 1);
                                if (r.note) {
                                    const noteText = (r.qty || 1) > 1 ? `${r.note} ×${r.qty}` : r.note;
                                    groups[key].notes.push(noteText);
                                }
                            });
                        } else if (e.text) {
                            legacyEntries.push(e);
                        }
                    });
                    Object.values(groups).sort((a, b) => a.item.localeCompare(b.item, 'zh-TW')).forEach(g => {
                        aggHtml += `<div class="grid gap-3 pb-2 mb-2 border-b border-white/10 items-start" style="grid-template-columns: 1fr 4rem 6rem;">
                            <div class="text-sm text-white/90 min-w-0">
                                <div class="font-bold">${g.item}</div>
                                ${g.notes.length > 0 ? `<ul class="mt-1 text-xs text-gray-400 space-y-0.5">${g.notes.map(n => `<li class="pl-3 relative">• ${n}</li>`).join('')}</ul>` : ''}
                            </div>
                            <div class="text-sm font-black text-blue-300 text-center">×${g.qty}</div>
                            <div class="text-sm font-black text-blue-300 text-right whitespace-nowrap">${g.total ? `NT$${g.total}` : '—'}</div>
                        </div>`;
                    });
                    legacyEntries.forEach(le => {
                        aggHtml += `<div class="grid gap-3 pb-2 mb-2 border-b border-white/10 items-center" style="grid-template-columns: 1fr 4rem 6rem;">
                            <div class="text-sm text-white/90 min-w-0 truncate" title="${le.text.replace(/"/g, '&quot;')}">${le.text.split('\n').join('、')}</div>
                            <div class="text-sm text-gray-500 text-center">—</div>
                            <div class="text-sm font-black text-blue-300 text-right whitespace-nowrap">${le.subtotal ? `NT$${le.subtotal}` : '—'}</div>
                        </div>`;
                    });
                } else {
                    const lines = [];
                    entries.forEach(e => {
                        if (e.rows) {
                            e.rows.forEach(r => {
                                lines.push({ item: r.item, qty: r.qty || 1, price: parseInt(r.price) || 0, note: r.note || '' });
                            });
                        } else if (e.text) {
                            e.text.split('\n').forEach(l => { if (l.trim()) lines.push({ legacy: true, text: l.trim() }); });
                        }
                    });
                    lines.sort((a, b) => ((a.item || a.text) || '').localeCompare((b.item || b.text) || '', 'zh-TW'));
                    lines.forEach(l => {
                        if (l.legacy) {
                            aggHtml += `<div class="border-b border-white/10 pb-2 mb-2"><div class="text-sm text-white/90">${l.text}</div></div>`;
                        } else {
                            const totalPrice = l.price * l.qty;
                            aggHtml += `<div class="grid gap-3 pb-2 mb-2 border-b border-white/10 items-center" style="grid-template-columns: 1fr 4rem 6rem;">
                                <div class="text-sm text-white/90 min-w-0">
                                    <span>${l.item}</span>${l.note ? `<span class="text-xs text-gray-400 ml-1">（${l.note}）</span>` : ''}
                                </div>
                                <div class="text-sm text-blue-300 text-center">${l.qty > 1 ? `×${l.qty}` : '—'}</div>
                                <div class="text-sm font-black text-blue-300 text-right whitespace-nowrap">${totalPrice ? `$${totalPrice}` : '—'}</div>
                            </div>`;
                        }
                    });
                }
                aggHtml += '</div>';
            });

            aggHtml += '</div>';

            const userTotals = {};
            allOrders.forEach(o => {
                if (!userTotals[o.user]) userTotals[o.user] = { count: 0, total: 0, stores: new Set(), orders: [] };
                userTotals[o.user].count++;
                userTotals[o.user].total += computeOrderTotal(o);
                userTotals[o.user].orders.push(o);
                (o.orders || []).forEach(item => userTotals[o.user].stores.add(item.menuTitle || '未分類'));
            });
            Object.values(userTotals).forEach(info => {
                info.paid = info.orders.length > 0 && info.orders.every(o => o.paid);
                info.receivedAmount = info.orders[0]?.receivedAmount || 0;
                info.changeGiven = info.orders.length > 0 && info.orders.every(o => o.changeGiven);
            });
            const userEntries = Object.entries(userTotals).sort((a, b) => b[1].total - a[1].total);
            currentSummaryUsers = userEntries.map(([u]) => u);

            let rightHtml = `<div class="bg-gray-900 text-white p-5 rounded-2xl mb-4">`;
            if (userEntries.length > 0) {
                rightHtml += `<div class="text-xs text-blue-400 font-bold tracking-widest uppercase mb-3 flex items-center gap-1.5">👤 個人結算</div>`;
                userEntries.forEach(([user, info], idx) => {
                    const multiStore = info.stores.size > 1;
                    const paid = info.paid;
                    const totalAmt = info.total;
                    const recv = info.receivedAmount || 0;
                    rightHtml += `<div class="bg-white/5 rounded-xl p-3 mb-2">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <div class="min-w-0 flex-1 flex items-center gap-1.5 flex-wrap">
                                <span class="text-sm font-black text-white truncate">${user}</span>
                                ${multiStore ? `<span class="text-[9px] font-bold text-yellow-300 bg-yellow-500/20 px-1.5 py-0.5 rounded-full whitespace-nowrap">跨 ${info.stores.size} 店</span>` : ''}
                            </div>
                            <span class="text-base font-black ${multiStore ? 'text-yellow-300' : 'text-blue-300'} whitespace-nowrap">NT$ ${totalAmt}</span>
                        </div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <button onclick="togglePaymentForUser(${idx})" class="text-[11px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap ${paid ? 'bg-green-500/30 text-green-200' : 'bg-red-500/30 text-red-200'}">
                                ${paid ? '✓ 已收' : '未收'}
                            </button>
                            ${paid ? `
                                <input type="number" placeholder="收款" value="${recv || ''}" oninput="calcChangeForUser(this, ${idx}, ${totalAmt})" class="w-20 text-[11px] p-1 rounded bg-white/10 text-white text-center outline-none focus:bg-white/20 placeholder-gray-500" style="border:1px solid rgba(255,255,255,0.1)">
                                <span id="change-user-${idx}" class="text-[11px] font-black ${recv > 0 ? (recv >= totalAmt ? 'text-green-300' : 'text-red-300') : ''}">${recv > 0 ? (recv >= totalAmt ? `找零 $${recv - totalAmt}` : `不足 $${totalAmt - recv}`) : ''}</span>
                                ${recv > 0 && recv >= totalAmt ? `<button onclick="toggleChangeGivenForUser(${idx})" class="text-[10px] font-bold px-1.5 py-0.5 rounded-full whitespace-nowrap ${info.changeGiven ? 'bg-green-500/30 text-green-200' : 'bg-white/10 text-gray-300'}">${info.changeGiven ? '✓ 已找零' : '找零'}</button>` : ''}
                            ` : ''}
                        </div>
                    </div>`;
                });
            }
            if (overallTotal > 0) {
                rightHtml += `<div class="border-t border-white/20 pt-4 flex justify-between items-center mt-4">
                    <span class="text-sm font-bold text-gray-300">全部總計</span>
                    <span class="text-xl font-black text-white">NT$ ${overallTotal}</span>
                </div>`;
            }
            rightHtml += `<div class="mt-3 pt-3 border-t border-white/10 flex justify-end">
                <button onclick="clearMenuOrders()" class="text-xs text-red-400 hover:text-red-300 font-bold bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full transition-colors">🗑️ 清除「${summaryTab}」訂單</button>
            </div>`;
            rightHtml += '</div>';

            let indivOrders = allOrders;
            if (multiMenu) indivOrders = allOrders.filter(o => (o.orders || []).some(item => item.menuTitle === summaryTab));

            let ordersHtml = '<div class="grid grid-cols-2 md:grid-cols-5 gap-2 mt-3">';
            indivOrders.forEach(o => {
                const list = o.orders || [];
                const displayList = multiMenu ? list.filter(item => item.menuTitle === summaryTab) : list;
                const flatRows = displayList.flatMap(item => {
                    const realIdx = list.indexOf(item);
                    if (item.rows) return item.rows.map((row, rIdx) => ({ type: 'row', row, realIdx, rIdx }));
                    return [{ type: 'text', item, realIdx }];
                });
                const orderTotal = computeOrderTotal(o);
                ordersHtml += `<div class="bg-gray-50 rounded-xl border border-gray-100 overflow-hidden">
                    <div class="p-3">
                        <div class="flex items-start justify-between mb-2">
                            <div class="min-w-0 flex-1">
                                <div class="text-base font-black text-gray-800 truncate">${o.user}</div>
                                <div class="flex items-center gap-2 mt-1 flex-wrap">
                                    ${orderTotal ? `<span class="text-sm font-black" style="color:#1a6b4a">NT$ ${orderTotal}</span>` : ''}
                                    <span class="text-[11px] text-gray-400">${o.time || ''}</span>
                                </div>
                            </div>
                            <button onclick="deleteOrder('${o._id}')" class="text-sm text-red-300 hover:text-red-500 flex-shrink-0 ml-1">✕</button>
                        </div>
                    </div>
                    ${flatRows.length > 0 ? `<div class="border-t border-gray-100 px-3 pb-2 pt-2 grid grid-cols-2 gap-x-2 gap-y-0">
                        ${flatRows.map(entry => {
                            if (entry.type === 'row') {
                                const { row, realIdx, rIdx } = entry;
                                return `<div class="py-1.5 border-b border-gray-100 min-w-0">
                                    <div class="text-xs text-gray-700 truncate leading-snug">${row.item}${row.qty > 1 ? ` ×${row.qty}` : ''}${row.note ? `（${row.note}）` : ''}</div>
                                    <div class="flex items-center gap-1 mt-0.5">
                                        <span class="text-xs font-black" style="color:#1a6b4a">${row.price ? '$' + row.price : '—'}</span>
                                        <button onclick="editRowPrice('${o._id}', ${realIdx}, ${rIdx})" class="text-[10px] px-0.5 rounded leading-none" style="color:#a07030">✏️</button>
                                    </div>
                                </div>`;
                            } else {
                                const { item, realIdx } = entry;
                                return `<div class="col-span-2 flex items-start justify-between gap-1 py-1.5 border-b border-gray-100">
                                    <div class="text-xs text-gray-700 truncate">${item.text.split('\n').join('、')}</div>
                                    <button onclick="editOrderSubtotal('${o._id}', ${realIdx})" class="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0" style="color:#a07030;background:#fdf0d8">✏️</button>
                                </div>`;
                            }
                        }).join('')}
                    </div>` : ''}
                </div>`;
            });
            ordersHtml += '</div>';
            container.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-[1fr,20rem] gap-4">${aggHtml}${rightHtml}</div>${ordersHtml}`;
        }

        function viewMenuImage(src) {
            if (!src) return;
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        async function deleteOrder(id) {
            if (!confirm("確定移除這筆訂單？")) return;
            await db.collection('orders').doc(id).delete();
        }

        async function editRowPrice(orderId, orderIndex, rowIndex) {
            const order = allOrders.find(o => o._id === orderId);
            if (!order) return;
            const item = order.orders[orderIndex];
            if (!item || !item.rows) return;
            const row = item.rows[rowIndex];
            const newVal = prompt(`修改「${row.item}」的金額（目前：$${row.price || 0}）：`, row.price || '');
            if (newVal === null) return;
            const newPrice = parseInt(newVal);
            if (isNaN(newPrice) || newPrice < 0) return;
            const newRows = item.rows.map((r, idx) => idx === rowIndex ? { ...r, price: String(newPrice) } : r);
            const newSubtotal = newRows.reduce((s, r) => s + (parseInt(r.price) || 0) * (r.qty || 1), 0);
            const newText = newRows.map(r => {
                let line = r.item;
                if (r.qty > 1) line += ` x${r.qty}`;
                if (r.price) line += `　$${r.price}`;
                if (r.note) line += `（${r.note}）`;
                return line;
            }).join('\n');
            const newOrders = order.orders.map((o, idx) =>
                idx === orderIndex ? { ...o, rows: newRows, subtotal: newSubtotal, text: newText } : o
            );
            const grandTotal = newOrders.reduce((s, o) => s + (o.subtotal || 0), 0);
            await db.collection('orders').doc(orderId).update({ orders: newOrders, grandTotal });
        }

        function toggleChangeGiven(id, current) {
            db.collection('orders').doc(id).update({ changeGiven: !current });
        }

        function togglePayment(id, currentPaid) {
            db.collection('orders').doc(id).update({ paid: !currentPaid });
        }

        async function togglePaymentForUser(idx) {
            const user = currentSummaryUsers[idx];
            if (!user) return;
            const userOrders = allOrders.filter(o => o.user === user);
            const allPaid = userOrders.length > 0 && userOrders.every(o => o.paid);
            const newPaid = !allPaid;
            const batch = db.batch();
            userOrders.forEach(o => batch.update(db.collection('orders').doc(o._id), { paid: newPaid }));
            await batch.commit();
        }

        function calcChangeForUser(input, idx, total) {
            const user = currentSummaryUsers[idx];
            if (!user) return;
            const span = document.getElementById(`change-user-${idx}`);
            if (!span) return;
            const userOrders = allOrders.filter(o => o.user === user);
            const key = 'user-' + user;
            if (!input.value.trim()) {
                span.textContent = '';
                span.className = 'text-[11px] font-black';
                clearTimeout(changeInputTimers[key]);
                changeInputTimers[key] = setTimeout(async () => {
                    const batch = db.batch();
                    userOrders.forEach(o => batch.update(db.collection('orders').doc(o._id), { receivedAmount: null, changeGiven: false }));
                    await batch.commit();
                }, 600);
                return;
            }
            const received = parseInt(input.value) || 0;
            const change = received - total;
            span.textContent = change >= 0 ? `找零 $${change}` : `不足 $${Math.abs(change)}`;
            span.className = `text-[11px] font-black ${change >= 0 ? 'text-green-300' : 'text-red-300'}`;
            clearTimeout(changeInputTimers[key]);
            changeInputTimers[key] = setTimeout(async () => {
                const batch = db.batch();
                userOrders.forEach(o => batch.update(db.collection('orders').doc(o._id), { receivedAmount: received }));
                await batch.commit();
            }, 600);
        }

        async function toggleChangeGivenForUser(idx) {
            const user = currentSummaryUsers[idx];
            if (!user) return;
            const userOrders = allOrders.filter(o => o.user === user);
            const allGiven = userOrders.length > 0 && userOrders.every(o => o.changeGiven);
            const newGiven = !allGiven;
            const batch = db.batch();
            userOrders.forEach(o => batch.update(db.collection('orders').doc(o._id), { changeGiven: newGiven }));
            await batch.commit();
        }

        async function editOrderSubtotal(orderId, orderIndex) {
            const order = allOrders.find(o => o._id === orderId);
            if (!order) return;
            const current = order.orders[orderIndex]?.subtotal || 0;
            const newVal = prompt(`修改金額（目前：NT$ ${current}）：`, current);
            if (newVal === null) return;
            const newSubtotal = parseInt(newVal);
            if (isNaN(newSubtotal)) return;
            const newOrders = order.orders.map((item, idx) =>
                idx === orderIndex ? { ...item, subtotal: newSubtotal } : item
            );
            const grandTotal = newOrders.reduce((s, o) => s + (o.subtotal || 0), 0);
            await db.collection('orders').doc(orderId).update({ orders: newOrders, grandTotal });
        }

        function calcChange(input, orderId, total) {
            const span = document.getElementById(`change-${orderId}`);
            if (!span) return;
            if (!input.value.trim()) {
                span.textContent = '';
                span.className = 'text-sm font-black';
                clearTimeout(changeInputTimers[orderId]);
                changeInputTimers[orderId] = setTimeout(() => {
                    db.collection('orders').doc(orderId).update({ receivedAmount: null, changeGiven: false });
                }, 600);
                return;
            }
            const received = parseInt(input.value) || 0;
            const change = received - total;
            span.textContent = change >= 0 ? `找零 NT$${change}` : `不足 NT$${Math.abs(change)}`;
            span.className = `text-sm font-black ${change >= 0 ? 'text-green-600' : 'text-red-500'}`;
            clearTimeout(changeInputTimers[orderId]);
            changeInputTimers[orderId] = setTimeout(() => {
                db.collection('orders').doc(orderId).update({ receivedAmount: received });
            }, 600);
        }

        async function clearMenuOrders() {
            if (!summaryTab) return;
            if (!confirm(`確定清除「${summaryTab}」的所有訂單？\n其他店家的訂單不受影響。`)) return;
            const snapshot = await db.collection('orders').get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const newOrders = (data.orders || []).filter(item => item.menuTitle !== summaryTab);
                if (newOrders.length === 0) {
                    batch.delete(doc.ref);
                } else {
                    const grandTotal = newOrders.reduce((s, item) => s + (item.subtotal || 0), 0);
                    batch.update(doc.ref, { orders: newOrders, grandTotal });
                }
            });
            await batch.commit();
        }

        function dateKey(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-content');
            if (!container) return;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayKey = dateKey(today);
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const weekColors = ['text-red-400', 'text-gray-500', 'text-gray-500', 'text-gray-500', 'text-gray-500', 'text-gray-500', 'text-blue-400'];

            let html = '<div class="grid grid-cols-7 gap-2">';
            weekdays.forEach((wd, i) => {
                html += `<div class="text-center text-xs font-bold pb-1 ${weekColors[i]}">週${wd}</div>`;
            });
            html += '</div>';

            const startDow = today.getDay();
            html += '<div class="grid grid-cols-7 gap-2 mt-1">';
            for (let i = 0; i < startDow; i++) html += '<div></div>';
            for (let i = 0; i < 28; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                const k = dateKey(d);
                const ids = menuCalendar[k] || [];
                const stores = ids.map(id => menuLibrary.find(m => m.id === id)).filter(Boolean);
                const isToday = k === todayKey;
                const dow = d.getDay();
                const dowColor = dow === 0 ? 'text-red-400' : (dow === 6 ? 'text-blue-400' : 'text-gray-400');
                html += `<div class="bg-gray-50 rounded-xl p-2 border ${isToday ? 'border-blue-500 ring-2 ring-blue-100 bg-blue-50' : 'border-gray-100'} min-h-[110px] flex flex-col">
                    <div class="flex items-baseline justify-between mb-1.5">
                        <span class="text-sm font-black ${isToday ? 'text-blue-600' : 'text-gray-800'}">${d.getMonth()+1}/${d.getDate()}</span>
                        <span class="text-[10px] ${dowColor}">週${weekdays[dow]}</span>
                    </div>
                    <div class="space-y-1 flex-1">
                        ${stores.map(s => `<div class="flex items-center justify-between text-[11px] bg-white px-1.5 py-0.5 rounded-lg border border-gray-100">
                            <span class="truncate">${menuEmoji(s.category)} ${s.title}</span>
                            <button onclick="removeFromCalendar('${k}', ${s.id})" class="text-red-300 hover:text-red-500 ml-1 leading-none">×</button>
                        </div>`).join('')}
                    </div>
                    <button onclick="openCalendarPick('${k}')" class="mt-1.5 text-[10px] font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 py-1 rounded-lg">＋ 加店家</button>
                </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function openCalendarPick(k) {
            calendarPickDate = k;
            const [y, m, d] = k.split('-');
            document.getElementById('calendar-pick-title').innerText = `${parseInt(m)}/${parseInt(d)} 選擇店家`;
            renderCalendarPickList();
            document.getElementById('calendar-pick-modal').classList.remove('hidden');
        }

        function closeCalendarPick(e) {
            if (e && e.target !== document.getElementById('calendar-pick-modal') && e.target !== undefined) return;
            document.getElementById('calendar-pick-modal').classList.add('hidden');
            calendarPickDate = null;
        }

        function renderCalendarPickList() {
            const list = document.getElementById('calendar-pick-list');
            const selected = menuCalendar[calendarPickDate] || [];
            if (menuLibrary.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 py-8 text-sm">資料庫沒有菜單，請先到「菜單管理」新增</div>';
                return;
            }
            list.innerHTML = menuLibrary.map(m => {
                const checked = selected.includes(m.id);
                return `<button onclick="toggleCalendarPick(${m.id})" class="w-full flex items-center gap-3 p-3 rounded-xl border transition-colors ${checked ? 'bg-blue-50 border-blue-300' : 'bg-gray-50 border-gray-100 hover:bg-gray-100'}">
                    <span class="text-lg">${checked ? '✓' : '○'}</span>
                    <span class="text-base">${menuEmoji(m.category)}</span>
                    <span class="text-sm font-bold text-gray-800 flex-1 text-left truncate">${m.title}</span>
                    <span class="text-[10px] text-gray-400">${m.category || ''}</span>
                </button>`;
            }).join('');
        }

        async function toggleCalendarPick(id) {
            if (!calendarPickDate) return;
            const current = menuCalendar[calendarPickDate] || [];
            const newList = current.includes(id) ? current.filter(i => i !== id) : [...current, id];
            const newCal = { ...menuCalendar };
            if (newList.length === 0) delete newCal[calendarPickDate];
            else newCal[calendarPickDate] = newList;
            await db.doc('settings/menuCalendar').set({ data: newCal });
            menuCalendar = newCal;
            renderCalendarPickList();
        }

        async function removeFromCalendar(k, id) {
            const newList = (menuCalendar[k] || []).filter(i => i !== id);
            const newCal = { ...menuCalendar };
            if (newList.length === 0) delete newCal[k];
            else newCal[k] = newList;
            await db.doc('settings/menuCalendar').set({ data: newCal });
        }

        function clearOrders() {
            document.getElementById('clear-modal').classList.remove('hidden');
        }

        function closeClearModal() {
            document.getElementById('clear-modal').classList.add('hidden');
        }

        async function confirmClearOrders() {
            closeClearModal();
            const snapshot = await db.collection('orders').get();
            const batch = db.batch();
            snapshot.docs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }
    </script>
</body>
</html>
