<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .menu-card-active { border: 2px solid #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="pb-32">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center">
                <span class="mr-2">🗃️</span> 豬仔養成計畫
            </h1>
            <div class="flex space-x-4">
                <button onclick="switchView('user')" id="btn-user" class="text-sm font-medium tab-active py-1">我要點餐</button>
                <button onclick="switchView('admin')" id="btn-admin" class="text-sm font-medium text-gray-500 py-1">菜單資料庫</button>
                <button onclick="switchView('summary')" id="btn-summary" class="text-sm font-medium text-gray-500 py-1">訂單統計</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- View: User (點餐) -->
        <section id="view-user" class="block">
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="active-menu-name" class="text-xl font-black text-gray-800 italic">尚未載入菜單</h2>
                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold">今日供應中</span>
                </div>
                <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-widest">Your Name</label>
                <input type="text" id="user-name-input" oninput="saveUserName()" class="w-full p-4 rounded-xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-400 outline-none transition-all text-lg font-bold" placeholder="輸入名字開始點餐...">
            </div>
            <div id="menu-container" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
        </section>

        <!-- View: Admin (資料庫管理) -->
        <section id="view-admin" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6">
                <h2 class="text-lg font-bold mb-4 flex items-center"><span class="mr-2">➕</span> 新增菜單到資料庫</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:bg-gray-50 transition-colors">
                        <input type="file" id="menu-image" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                        <label for="menu-image" class="cursor-pointer block py-8">
                            <div id="upload-placeholder">
                                <div class="text-4xl mb-2">📸</div>
                                <p class="text-sm font-bold text-blue-600">上傳菜單圖片</p>
                                <p class="text-xs text-gray-400 mt-1">點此選取或拍照</p>
                            </div>
                            <img id="image-preview" class="hidden max-h-48 mx-auto rounded shadow-sm">
                        </label>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-400 mb-1">店名</label>
                        <input type="text" id="new-menu-title" class="w-full p-2 border-b mb-4 outline-none focus:border-blue-500 font-bold text-lg" placeholder="輸入店名">
                        <label class="text-xs font-bold text-gray-400 mb-1">品項清單（每行一項：品名 價格）</label>
                        <textarea id="raw-menu-text" class="flex-grow w-full h-48 p-3 bg-gray-50 rounded-lg text-xs font-mono outline-none focus:bg-white border border-transparent focus:border-blue-200" placeholder="滷肉飯 35&#10;排骨飯 70&#10;雞腿飯 80"></textarea>
                        <button onclick="saveToDatabase()" class="mt-4 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition-all shadow-lg shadow-green-100 flex items-center justify-center">
                            <span class="mr-2">💾</span> 儲存到我的資料庫
                        </button>
                    </div>
                </div>
            </div>
            <h2 class="text-lg font-bold mb-4 flex items-center px-2 text-gray-700"><span class="mr-2">📁</span> 我的菜單資料庫</h2>
            <div id="database-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </section>

        <!-- View: Summary (統計) -->
        <section id="view-summary" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">ORDERS SUMMARY</h2>
                    <button onclick="clearOrders()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">清空紀錄</button>
                </div>
                <div id="order-summary-content"></div>
            </div>
        </section>

    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 px-6 py-4 shadow-2xl z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-gray-400 font-black uppercase">Current Total</p>
                <p class="text-2xl font-black text-blue-600">NT$ <span id="cart-total">0</span></p>
            </div>
            <button id="submit-btn" onclick="submitOrder()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 disabled:bg-gray-200 disabled:text-gray-400 transition-all active:scale-95">
                送出點餐
            </button>
        </div>
    </div>

    <script>
        let menuLibrary = JSON.parse(localStorage.getItem('menuLibrary')) || [];
        let activeMenu = JSON.parse(localStorage.getItem('activeMenu')) || null;
        let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
        let currentUserName = localStorage.getItem('currentUserName') || "";
        let cart = {};

        window.onload = () => {
            document.getElementById('user-name-input').value = currentUserName;
            renderActiveMenu();
            renderLibrary();
            updateCartUI();
        };

        function saveUserName() {
            currentUserName = document.getElementById('user-name-input').value.trim();
            localStorage.setItem('currentUserName', currentUserName);
            updateCartUI();
        }

        function switchView(view) {
            ['user', 'admin', 'summary'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('tab-active', 'text-blue-600');
                document.getElementById(`btn-${v}`).classList.add('text-gray-500');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('tab-active', 'text-blue-600');
            document.getElementById('cart-bar').style.display = (view === 'user') ? 'flex' : 'none';
            if (view === 'summary') renderSummary();
            if (view === 'admin') renderLibrary();
        }

        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function saveToDatabase() {
            const title = document.getElementById('new-menu-title').value.trim();
            const rawText = document.getElementById('raw-menu-text').value.trim();
            if (!title || !rawText) { alert("請確保已有店名與辨識結果。"); return; }

            const items = rawText.split('\n').map(line => {
                const parts = line.trim().split(/\s+/);
                if (parts.length < 2) return null;
                const price = parseInt(parts.pop().replace(/[^0-9]/g, "")) || 0;
                return { name: parts.join(" "), price };
            }).filter(i => i && i.name);

            if (items.length === 0) { alert("格式解析失敗，請手動校正品名後方需有價格。"); return; }

            menuLibrary.push({ id: Date.now(), title, items });
            localStorage.setItem('menuLibrary', JSON.stringify(menuLibrary));
            renderLibrary();
            alert("儲存成功！");
        }

        function renderLibrary() {
            const list = document.getElementById('database-list');
            list.innerHTML = menuLibrary.length ? '' : `<div class="col-span-full py-10 text-center text-gray-400">資料庫是空的</div>`;
            menuLibrary.forEach(menu => {
                const isActive = activeMenu && activeMenu.id === menu.id;
                const card = document.createElement('div');
                card.className = `bg-white p-4 rounded-xl border transition-all ${isActive ? 'menu-card-active shadow-md' : 'border-gray-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-800">${menu.title}</h3>
                        <span class="text-[10px] text-gray-400">${menu.items.length} 品項</span>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="setActiveMenu(${menu.id})" class="flex-1 text-xs py-2 rounded-lg font-bold ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}">
                            ${isActive ? '使用中' : '啟用'}
                        </button>
                        <button onclick="deleteFromLibrary(${menu.id})" class="p-2 text-red-300">🗑️</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function setActiveMenu(id) {
            activeMenu = menuLibrary.find(m => m.id === id);
            localStorage.setItem('activeMenu', JSON.stringify(activeMenu));
            cart = {};
            renderActiveMenu();
            renderLibrary();
            switchView('user');
        }

        function deleteFromLibrary(id) {
            if (!confirm("確定刪除？")) return;
            menuLibrary = menuLibrary.filter(m => m.id !== id);
            localStorage.setItem('menuLibrary', JSON.stringify(menuLibrary));
            if (activeMenu?.id === id) {
                activeMenu = null;
                localStorage.removeItem('activeMenu');
            }
            renderLibrary();
            renderActiveMenu();
        }

        function renderActiveMenu() {
            const container = document.getElementById('menu-container');
            const titleDisplay = document.getElementById('active-menu-name');
            container.innerHTML = '';
            if (!activeMenu) {
                titleDisplay.innerText = "尚未選擇菜單";
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400">請到菜單資料庫啟用一份菜單。</div>`;
                return;
            }
            titleDisplay.innerText = activeMenu.title;
            activeMenu.items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border border-gray-100 flex flex-col justify-between";
                card.innerHTML = `
                    <div><h4 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">${item.name}</h4><p class="text-blue-600 font-black mb-3">$${item.price}</p></div>
                    <div class="flex items-center justify-between bg-gray-50 rounded-lg p-1">
                        <button onclick="addToCart(${idx}, -1)" class="w-8 h-8">-</button>
                        <span class="text-sm font-bold" id="qty-${idx}">${cart[idx] || 0}</span>
                        <button onclick="addToCart(${idx}, 1)" class="w-8 h-8 bg-white rounded shadow-sm text-blue-600">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
            updateCartUI();
        }

        function addToCart(idx, change) {
            cart[idx] = (cart[idx] || 0) + change;
            if (cart[idx] <= 0) delete cart[idx];
            document.getElementById(`qty-${idx}`).innerText = cart[idx] || 0;
            updateCartUI();
        }

        function updateCartUI() {
            let total = 0, count = 0;
            if (activeMenu) {
                Object.entries(cart).forEach(([idx, qty]) => {
                    total += activeMenu.items[idx].price * qty;
                    count += qty;
                });
            }
            document.getElementById('cart-total').innerText = total;
            const btn = document.getElementById('submit-btn');
            btn.disabled = !(currentUserName && count > 0);
            btn.innerText = !currentUserName ? "請輸入名字" : (count > 0 ? "確認送出點餐" : "請選擇餐點");
        }

        function submitOrder() {
            const items = Object.entries(cart).map(([idx, qty]) => ({ name: activeMenu.items[idx].name, price: activeMenu.items[idx].price, qty }));
            allOrders.unshift({ user: currentUserName, shop: activeMenu.title, items, total: document.getElementById('cart-total').innerText, time: new Date().toLocaleTimeString() });
            localStorage.setItem('allOrders', JSON.stringify(allOrders));
            cart = {};
            renderActiveMenu();
            switchView('summary');
        }

        function renderSummary() {
            const container = document.getElementById('order-summary-content');
            if (allOrders.length === 0) { container.innerHTML = '<p class="text-center py-20 text-gray-400">無紀錄</p>'; return; }
            const aggregate = {};
            allOrders.forEach(o => o.items.forEach(i => aggregate[i.name] = (aggregate[i.name] || 0) + i.qty));
            let html = `<div class="bg-gray-900 text-white p-6 rounded-2xl mb-6">${Object.entries(aggregate).map(([name, qty]) => `<div class="flex justify-between border-b border-white/10 pb-1 mb-1"><span>${name}</span><span class="font-bold">x${qty}</span></div>`).join('')}</div><div class="space-y-4">`;
            allOrders.forEach(o => { html += `<div class="bg-gray-50 p-4 rounded-xl border"><b>${o.user}</b> <span class="text-blue-600">$${o.total}</span><div class="text-xs text-gray-500">${o.items.map(i => `${i.name}x${i.qty}`).join(', ')}</div></div>`; });
            container.innerHTML = html + "</div>";
        }

        function clearOrders() { if (confirm("確定清空？")) { allOrders = []; localStorage.setItem('allOrders', JSON.stringify(allOrders)); renderSummary(); } }
    </script>
</body>
</html>
